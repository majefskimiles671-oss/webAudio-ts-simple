<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BareTrack/AudioPad/WaveStack - Layout Demo</title>

    <style>
        /* Structural CSS */
        :root {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;
            --bg-button: #828282;

            --text-main: #eee;
            --text-muted: #aaa;
            --text-button: #2f2f2f;

            --accent-primary: #ff9500;
            --accent-danger: #ff3b30;
            --accent-highlight: #ffd400;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;

            --border-subtle: #333;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;


            background: var(--bg-app);
            color: var(--text-main);

        }


        button {
            background: var(--bg-button);
            border: 1px solid var(--border-subtle);
            color: var(--text-button);
        }

        /* Transport */

        .transport {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            /* background: #1a1a1a;
            border-bottom: 1px solid #333; */

            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);

        }

        .transport button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .transport button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }


        #transport-toggles {
            display: flex;
            gap: 8px;
        }

        .transport-toggle {
            /* width: 22px; */
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            cursor: pointer;
        }

        .transport-toggle.active {
            background: #ff3b30;
            color: black;
        }

        /* Metronome */
        .metronome-scan {
            position: relative;
            width: 80px;
            height: 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            overflow: hidden;
        }

        .metronome-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-primary);
        }

        .record-btn.recording {
            background: #ff3b30;
            color: black;
        }


        #playBtn.active {
            background: var(--accent-primary);
            color: black;
        }


        #playRecordBtn {
            border-radius: 6px 10px 10px 6px;
            padding: 5px;
        }

        #playRecordBtn.active {
            box-shadow:
                inset 0 0 0 2px rgba(0, 0, 0, 0.35);


            background: linear-gradient(90deg,
                    var(--accent-primary) 0%,
                    var(--accent-primary) 30%,
                    color-mix(in oklab, var(--accent-primary), var(--accent-danger)) 50%,
                    var(--accent-danger) 70%,
                    var(--accent-danger) 100%);


        }



        /* Timer */

        .timer {
            font-variant-numeric: tabular-nums;
            min-width: 80px;
        }

        /* Meter */

        .meter {
            width: 120px;
            height: 10px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .meter.active {
            display: block;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4cd964, #ffd400, #ff3b30);
            transition: width 0.1s linear;
        }




        /* Layout */

        .layout-root {
            flex: 1;
            display: grid;
            grid-template-columns: 220px 1fr;
            overflow: hidden;
        }

        /* Controls column */

        #controls-column {

            display: flex;
            flex-direction: column;
            overflow: hidden;

        }

        #controls-column-spacer {

            height: 32px;
            /* must match ruler height */
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-panel);

        }

        #controls-scroll-column {
            background: var(--bg-app);
            overflow-y: auto;
            /* overflow-x: hidden;
            padding-top: 32px; */
        }

        .control-row {
            padding: 0px;
            box-sizing: border-box;
        }

        /* Track name */

        .track-title {
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-title:hover {
            background: var(--bg-panel);
        }

        .track-title:focus {
            outline: 1px solid #ff9500;
            background: var(--bg-surface);
        }

        .track-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .solo-btn {
            padding: 2px 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .solo-btn.active {
            background: #ffd400;
            color: black;
        }


        .solo-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .gain-slider {
            width: 100%;
        }


        .track-toggles {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .toggle-btn {
            width: 22px;
            height: 16px;
            padding: 0;
            cursor: pointer;
            border-radius: 3px;
        }

        .toggle-btn.active {
            background: var(--accent-highlight);
        }


        /* Timeline */

        .timeline-ruler {
            height: 32px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 5;
        }


        .timeline-ruler-inner {
            position: relative;
            height: 100%;
        }

        #timeline-ruler-canvas {
            height: 100%;
            width: 100%;
            display: block;
        }


        #timeline-inner {
            position: relative;
            width: max-content;
            overflow: visible;
        }


        #timeline-area {
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
            background: var(--bg-panel);
            overscroll-behavior: none;
        }

        #timeline-overlay {
            position: absolute;
            top: 32px;
            /* height of timeline-ruler */
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .timeline-row {
            padding: 0px;
            box-sizing: border-box;
        }

        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ff9500;
            z-index: 10;
        }



        #record-range {
            position: absolute;
            left: 0;
            bottom: 0;
            /* ✅ now works correctly */
            height: 2px;
            background: var(--accent-danger);
            pointer-events: none;
            background: var(--accent-danger);
            opacity: 0.85;
        }


        .row-inner {
            padding: 8px;
        }

        .waveform {
            display: inline-block;
            height: 80px;
            background-color: var(--bg-surface);

            background-image: repeating-linear-gradient(90deg,
                    var(--waveform-a),
                    var(--waveform-a) 20px,
                    var(--waveform-b) 20px,
                    var(--waveform-b) 40px);
        }

        .waveform-canvas {
            display: block;
            height: 100%;
        }


.waveform::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.04),
    transparent,
    rgba(0,0,0,0.04)
  );
  pointer-events: none;
}

        body[data-theme="light"] {

            --text-main: #111;

            --waveform-a: #ddd;
            --waveform-b: #ccc;

        body[data-theme="studio"] {
            --bg-app: #0f172a;
            --bg-surface: #111827;
            --bg-panel: #020617;

            --text-main: #d1d5db;
            --text-muted: #9ca3af;

            --waveform-a: #1f2933;
            --waveform-b: #111827;
        }


        /* Menu CSS */

        .menu-bar {
            height: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 12px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border-subtle);


            position: relative;
            z-index: 100;

        }

        .menu-label {
            display: flex;
            align-items: center;
            height: 100%;

            padding: 4px 6px;
            border-radius: 4px;
        }

        .menu:hover .menu-label {
            background: var(--bg-panel);
        }

        .menu {
            position: relative;
        }

        .menu-pop {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bg-panel);
            padding: 6px;
            min-width: 200px;
        }

        .menu:hover .menu-pop {
            display: block;
        }

        .menu-pop div {
            padding: 6px 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-pop div:hover {
            background: var(--bg-surface);
            border-radius: 4px;
        }
    </style>
    <style>
        /* Other CSS */

        /* =============================
            DEBUG TRANSPORT STATE
        ============================= */

        #debug-transport-state {

            right: 8px;

            padding: 6px 10px;

            color: #eee;
            border-radius: 4px;

            pointer-events: none;
            display: none;

        body.debug #debug-transport-state {
            display: block;
        }

        /* =============================
            DEBUG SCROLL
        ============================= */

        body.debug #controls-column::after,
        body.debug #timeline-area::after {
            content: attr(data-scroll);
            position: sticky;
            top: 4px;
            font-size: 10px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
        }

        /* =============================
            DEBUG BOUNDING BOXES
        ============================= */

        body.debug .menu-bar {
            outline: 2px solid #ff00ff;
        }

        body.debug .transport {
            outline: 2px solid #00ffff;
        }

        body.debug .layout-root {
            outline: 2px solid #ffff00;
        }

        body.debug #controls-column {
            outline: 2px solid #ff9500;
        }

        body.debug #timeline-area {
            outline: 2px solid #4cd964;
        }

        body.debug #timeline-overlay {
            outline: 2px dashed #ffd400;
        }

        body.debug .control-row {
            outline: 1px dashed #ff3b30;
        }

        body.debug .timeline-row {
            outline: 1px dashed #4cd964;
        }
    </style>

        function renderTimelineRuler() {

            const contentWidth = timelineInner.scrollWidth;
            const viewWidth = timelineArea.clientWidth;

            const rulerHeight = 32;

            // Canvas sizing (authoritative)
            rulerCanvas.style.height = `${rulerHeight}px`;
            rulerCanvas.width = contentWidth;
            rulerCanvas.height = rulerHeight;

            const height = rulerCanvas.height;

            rulerCtx.clearRect(0, 0, contentWidth, height);

            const scrollLeft = timelineArea.scrollLeft;
            const startSeconds = pixelsToSeconds(scrollLeft);
            const endSeconds = pixelsToSeconds(scrollLeft + viewWidth);

            rulerCtx.font = "10px monospace";
            rulerCtx.fillStyle = "var(--text-muted)";

            let ticks = [];

            // ==========================
            // TICK GENERATION
            // ==========================

            if (rulerMode === "seconds") {

                const majorStep =
                    zoom <= 0.5 ? 4 :
                        zoom <= 1 ? 2 :
                            zoom <= 2 ? 1 : 0.5;

                const minorStep = majorStep / 4;

                for (
                    let t = Math.floor(startSeconds / minorStep) * minorStep;
                    t <= endSeconds;
                    t += minorStep
                ) {
                    ticks.push({
                        time: t,
                        major: Math.abs(t % majorStep) < 0.0001,
                        label:
                            Math.abs(t % majorStep) < 0.0001
                                ? formatTime(t)
                                : null
                    });
                }

            } else if (rulerMode === "bars") {

                const barLen = secondsPerBar();
                const beatLen = secondsPerBeat();

                const firstBar =
                    Math.floor(startSeconds / barLen);

                let barTime = firstBar * barLen;

                while (barTime <= endSeconds) {

                    // Major bar tick
                    ticks.push({
                        time: barTime,
                        major: true,
                        label: `Bar ${firstBar + 1 + ((barTime - firstBar * barLen) / barLen)}`
                    });

                    // Beat ticks
                    for (let b = 1; b < beatsPerBar; b++) {
                        const bt = barTime + b * beatLen;
                        if (bt >= startSeconds && bt <= endSeconds) {
                            ticks.push({
                                time: bt,
                                major: false,
                                label: null
                            });
                        }
                    }

                    barTime += barLen;
                }
            }

            // ==========================
            // TICK RENDERING
            // ==========================

            for (const tick of ticks) {
                const x = secondsToPixels(tick.time);

                if (tick.major) {
                    rulerCtx.strokeStyle = "var(--text-main)";
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, 8);
                    rulerCtx.stroke();

                    if (tick.label) {
                        rulerCtx.fillText(tick.label, x + 2, 10);
                    }
                } else {
                    rulerCtx.strokeStyle = "var(--border-subtle)";
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, height - 6);
                    rulerCtx.stroke();
                }
            }

            // ==========================
            // PLAYHEAD LINE
            // ==========================

            if (getTransportState() !== "IDLE") {
                const playheadX = getPlayheadX();

                rulerCtx.strokeStyle = "var(--accent-primary)";
                rulerCtx.lineWidth = 1;

                rulerCtx.beginPath();
                rulerCtx.moveTo(playheadX + 0.5, 0);
                rulerCtx.lineTo(playheadX + 0.5, height);
                rulerCtx.stroke();
            }
        }


        timelineArea.addEventListener("scroll", () => {
            renderTimelineRuler();
        });


        function renderMetronomeScan() {
            if (getTransportState() === "IDLE") return;

            const t = getPlayheadTime();        // seconds
            const spb = secondsPerBeat();       // already defined


const spbar = secondsPerBar();
const phase = (t / spbar) % 1;


            // const phase = (t / spb) % 1;        // 0 → 1 per beat

            const scan = document.querySelector(".metronome-scan");
            const line = scan.querySelector(".metronome-line");

            const width = scan.clientWidth;
            const x = phase * width;

            line.style.transform = `translateX(${x}px)`;
        }



        // ==========================
        // RULER STATE
        // ==========================

        let rulerMode = "seconds"; // "seconds" | "bars"



        // ==========================
        // MUSICAL GRID
        // ==========================

        let bpm = 120;         // beats per minute
        let beatsPerBar = 4;  // time signature numerator


        function secondsPerBeat() {
            return 60 / bpm;
        }

        function secondsPerBar() {
            return secondsPerBeat() * beatsPerBar;
        }


        function getRulerTicks(startSeconds, endSeconds) {
            if (rulerMode === "seconds") {
                return getSecondTicks(startSeconds, endSeconds);
            }
            if (rulerMode === "bars") {
                return getBarTicks(startSeconds, endSeconds);
            }
        }


        function getSecondTicks(startSeconds, endSeconds) {
            const majorStep =
                zoom <= 0.5 ? 4 :
                    zoom <= 1 ? 2 :
                        zoom <= 2 ? 1 : 0.5;

            const minorStep = majorStep / 4;
            const ticks = [];

            for (
                let t = Math.floor(startSeconds / minorStep) * minorStep;
                t <= endSeconds;
                t += minorStep
            ) {
                ticks.push({
                    time: t,
                    major: Math.abs(t % majorStep) < 0.0001,
                    label: Math.abs(t % majorStep) < 0.0001
                        ? formatTime(t)
                        : null
                });
            }

            return ticks;
        }


        function getBarTicks(startSeconds, endSeconds) {
            const barLength = secondsPerBar();
            const beatLength = secondsPerBeat();
            const ticks = [];

            const startBar =
                Math.floor(startSeconds / barLength);

            let t = startBar * barLength;

            while (t <= endSeconds) {
                // Major bar tick
                ticks.push({
                    time: t,
                    major: true,
                    label: `Bar ${startBar + 1}`
                });

                // Beat ticks
                for (let b = 1; b < beatsPerBar; b++) {
                    const bt = t + b * beatLength;
                    if (bt >= startSeconds && bt <= endSeconds) {
                        ticks.push({
                            time: bt,
                            major: false,
                            label: null
                        });
                    }
                }

                t += barLength;
            }

            return ticks;
        }


        function toggleRulerMode() {
            rulerMode =
                rulerMode === "seconds" ? "bars" : "seconds";
            renderTimelineRuler();
        }

        function setRulerMode(mode) {

            rulerMode = mode;
            // rulerMode === "seconds" ? "bars" : "seconds";
            renderTimelineRuler();
        }



        // ==========================
        // TRANSPORT STATE
        // ==========================
        let playing = false;
        let recording = false;
        let startTime = 0;
        let recordStartX = null;


        // ==========================
        // TRANSPORT HELPERS
        // ==========================
        /**
         * These helpers answer questions or calculations.
         * They do not mutate DOM.
         * You are not required to use these everywhere yet.
         * Their existence alone stabilizes the mental model.
         * 
         * This is pure logic. No DOM mutation.
         * This is a query, not an effect
         * Multiple future features will use this (record ranges, scrubbing, punch‑in)
         * Deterministic
         * Stateless
         * Used by animation loop
         * 
         * State machines are for branching decisions, not for mutations.

            So:

            getTransportState() → decision logic
            button handlers → state changes
            animation/UI sync → rendering

         **/
        function isTransportMoving() {
            return getTransportState() !== "IDLE";
        }

        // tiny state machine
        // Use getTransportState() to explain behavior, not to control everything.
        /** 
         * State mutations change flags.
         * Transition detection decides behavior.
         **/
        function getTransportState() {
            if (playing && recording) return "PLAY_RECORD";
            if (playing) return "PLAY";
            if (recording) return "RECORD";
            return "IDLE";
        }

        function getPlayheadX() {
            const transform = playhead.style.transform;
            if (!transform) return 0;

            const match = transform.match(/translateX\(([-\d.]+)px\)/);
            return match ? parseFloat(match[1]) : 0;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            const t = Math.floor((s * 10) % 10);
            return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${t}`;
        }


        // ==========================
        // TRANSPORT UI DOM SYNC
        // ==========================
        /**
         * This is your UI truth layer.
         * Nothing in here:
         * toggles state
         * decides behavior
         * starts timers
         * It only reflects current state.
         * If something looks wrong visually, the bug is here, not in button handlers.
         **/
        function syncTransportUI() {
            const state = getTransportState();

            playBtn.classList.toggle("active", state === "PLAY" || state === "PLAY_RECORD");
            recordBtn.classList.toggle("recording", state === "RECORD" || state === "PLAY_RECORD");
            playRecordBtn.classList.toggle("active", state === "PLAY_RECORD");
            meter.classList.toggle("active", state === "RECORD" || state === "PLAY_RECORD");


            // DEBUG OVERLAY
            if (document.body.classList.contains("debug")) {
                debugTransportState.textContent =
                    `Transport: ${state}`;
            }

        }


        // ==========================
        // ANIMATION LOOPS
        // ==========================
        /**
         * These are special. They:
         * run forever
         * draw based on state
         * never change state
         * 
         * Notice:
         * no buttons
         * no toggles
         * no branching chaos
         * This dramatically lowers cognitive load.
         **/
        function updatePlayhead() {
            if (getTransportState() === "IDLE") return;

            const elapsed = (performance.now() - startTime) / 1000;
            const x = elapsed * BASE_PPS * zoom;

            playhead.style.transform = `translateX(${x}px)`;

            // recording range update
            // if (recording && recordStartX !== null) {
            //     const width = x - recordStartX;

            //     recordRange.style.width =
            //         `${Math.max(0, width)}px`;
            // }


            if (recording) {
                updateRecordRange();
            }


            // scroll
            const right = timelineArea.scrollLeft + timelineArea.clientWidth;
            if (x > right - SCROLL_THRESHOLD) {
                timelineArea.scrollLeft =
                    x - (timelineArea.clientWidth - SCROLL_THRESHOLD);
            }

            timer.textContent = formatTime(elapsed);
            renderTimelineRuler();
            renderMetronomeScan();
            requestAnimationFrame(updatePlayhead);
        }

        function resetPlayhead() {
            playhead.style.transform = "translateX(0px)";
            timelineArea.scrollLeft = 0;
            timer.textContent = "00:00.0";
        }

        function updateMeter() {
            if (recording) {
                meterBar.style.width = `${20 + Math.random() * 80}%`;
            }
            requestAnimationFrame(updateMeter);
        }


        // ==========================
        // SCROLL / GEOMETRY SYNC
        // ==========================
        /**
         * This governs shared vertical scrolling, which is orthogonal to transport.
         * Why here
         * It’s not transport logic
         * It’s not UI rendering
         * It’s about input routing + geometry
         * Later, if bugs appear here, your brain knows exactly where to look.
         **/
        // Sync scrollTop from timeline → controls
        // Add this once, after you define timelineArea and controlsCol:
        timelineArea.addEventListener("scroll", () => {
            controlsScrollCol.scrollTop = timelineArea.scrollTop;

            // debug output
            if (document.body.classList.contains("debug")) {
                controlsScrollCol.dataset.scroll =
                    controlsScrollCol.scrollTop;
                timelineArea.dataset.scroll =
                    timelineArea.scrollTop;
            }
        });

        // add this js once
        controlsScrollCol.addEventListener("wheel", (e) => {
            timelineArea.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });


        function syncTimelineOverlay() {
            const timelineColumn = document.getElementById("timeline-column");
            const timelineOverlay = document.getElementById("timeline-overlay");

            if (!timelineColumn || !timelineOverlay) return;

            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;

            timelineOverlay.style.height =
                `${timelineColumn.scrollHeight}px`;
        }


        function syncTimelineOverlayWidth() {
            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;
        }


        // ==========================
        // TRACK & CONTROL INTERACTION
        // ==========================
        /* This is local UI behavior, not transport state. Why here

        These are not play/record state
        They are UI‑only mode selectors
        Later could move to their own helper 

        track‑local control behavior.

        Why here

        Operates on tracks
        Has its own micro‑state
        Should never bleed into transport concerns
        */
        // linked toggle behavior
        transportToggles.forEach(btn => {
            btn.addEventListener("click", () => {
                transportToggles.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        // solo buttons
        function setupSoloBtns() {
            const soloButtons = Array.from(
                document.querySelectorAll(".solo-btn")
            );
            soloButtons.forEach(btn => {
                btn.addEventListener("click", () => {
                    const isActive = btn.classList.contains("active");

                    // Reset all
                    soloButtons.forEach(b => {
                        b.classList.remove("active");
                        b.disabled = false;
                    });

                    // If clicked button was not active, activate it and disable others
                    if (!isActive) {
                        btn.classList.add("active");
                        soloButtons.forEach(b => {
                            if (b !== btn) b.disabled = true;
                        });
                    }
                });
            });
        }


        // ==========================
        // THEME / DEBUG / GLOBAL UI
        // ==========================
        /* Menu and Themes Logic 
        Global UI concern
        No effect on transport or tracks

        Global tool
        Orthogonal to everything else
        */

        document.querySelectorAll("[data-theme]").forEach(el => {
            el.onclick = () => {
                document.body.setAttribute("data-theme", el.dataset.theme);
            };
        });

        document.body.setAttribute("data-theme", "light");

        document.addEventListener("keydown", (e) => {
            if (e.key === "d") {
                document.body.classList.toggle("debug");
            }
        });

        document.querySelectorAll("[data-ruler]").forEach(el => {
            el.onclick = () => {
                const mode = el.getAttribute("data-ruler");
                setRulerMode(mode);
            };
        });


        // ==========================
        // TRACK CREATION
        // ==========================
        /**
         * When you read this block later, you know it does not affect transport state.
         **/

        function computeWaveformWidth(seconds) {
            return Math.floor(seconds * BASE_PPS * zoom);
        }

        function rerenderWaveforms() {
            /**
             * Make sure that every time you draw a waveform you do this first:
             * canvas.height = TRACK_HEIGHT;          // e.g. 80
             * canvas.style.height = `${TRACK_HEIGHT}px`;
             **/
            document.querySelectorAll(".timeline-row").forEach((row, i) => {
                const canvas = row.querySelector(".waveform-canvas");
                if (!canvas) return;

                const durationSeconds = 10 + i * 5;
                const waveformWidth = computeWaveformWidth(durationSeconds);

                const TRACK_HEIGHT = 80;
                canvas.width = waveformWidth;
                canvas.height = TRACK_HEIGHT;

                // Optional: redraw a fake waveform


                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // ctx.fillStyle = "#666";
                // ctx.fillRect(0, canvas.height / 2, canvas.width, 1);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        for (let i = 0; i < 8; i++) {
            /* ----- Controls Row ----- */

            const controlFrag = controlTpl.content.cloneNode(true);
            const controlRow = controlFrag.querySelector(".control-row");
            const title = controlFrag.querySelector(".track-title");
            const soloBtn = controlFrag.querySelector(".solo-btn");

            title.textContent = `Track ${i + 1}`;
            title.spellcheck = false;

            title.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    title.blur();
                }
            });

            title.addEventListener("blur", () => {
                const t = title.textContent.trim();
                title.textContent = t === "" ? `Track ${i + 1}` : t;
            });

            controlFrag.querySelectorAll(".toggle-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    btn.classList.toggle("active");
                });
            });

            controlsScrollCol.appendChild(controlFrag);

            /* ----- Timeline Row ----- */

            const timelineFrag = timelineTpl.content.cloneNode(true);
            const timelineRow = timelineFrag.querySelector(".timeline-row");
            const canvas = timelineFrag.querySelector(".waveform-canvas");

            const trackDurationSeconds = 10 + i * 5;
            canvas.width = computeWaveformWidth(trackDurationSeconds);

            timelineCol.appendChild(timelineFrag);

            /* ----- Height Sync ----- */

            const ro = new ResizeObserver(([e]) => {
                controlRow.style.height = `${e.contentRect.height}px`;
            });

            ro.observe(timelineRow);
        }

        // ==========================
        // ZOOM HANDLER
        // ==========================

        zoomSlider.oninput = () => {
            const centerTime = timelineArea.scrollLeft / (BASE_PPS * zoom);

            zoomIndex = parseInt(zoomSlider.value, 10);
            zoom = zoomLevels[zoomIndex];

            rerenderWaveforms();
            syncTimelineOverlay();
            renderTimelineRuler();
            timelineArea.scrollLeft = centerTime * BASE_PPS * zoom;
        };


        // ==========================
        // TRANSPORT BUTTON HANDLERS
        // ==========================
        /**
         * This is the only place where transport state changes. 
         * Keep them boring and small.
         * This is where future complexity will live — now it’s clearly contained.
         **/


        let recordStartTime = null;

        function startRecordingRange() {
            recordStartTime = getPlayheadTime(); // seconds
            recordRange.style.display = "block";
            recordRange.style.width = "0px";
        }


        function getPlayheadTime() {
            const x = getPlayheadX();
            return pixelsToSeconds(x);
        }


        function updateRecordRange() {
            if (recordStartTime === null) return;

            const currentTime = getPlayheadTime();

            const startX = secondsToPixels(recordStartTime);
            const endX = secondsToPixels(currentTime);

            recordRange.style.left = `${startX}px`;
            recordRange.style.width = `${Math.max(0, endX - startX)}px`;
        }


        function clearRecordingRange() {
            recordRange.style.display = "none";
            recordStartX = null;
        }

        function applyTransportChange({ play, record }) {
            const prevState = getTransportState();
            const wasRecording = recording;

            playing = play;
            recording = record;

            const nextState = getTransportState();

            if (prevState === "IDLE" && nextState !== "IDLE") {
                startTime = performance.now();
                updatePlayhead();
            }

            if (prevState !== "IDLE" && nextState === "IDLE") {
                resetPlayhead();
            }

            if (!wasRecording && recording) startRecordingRange();
            if (wasRecording && !recording) clearRecordingRange();

            syncTransportUI();
        }


        playBtn.onclick = () =>
            applyTransportChange({ play: !playing, record: recording });

        recordBtn.onclick = () =>
            applyTransportChange({ play: playing, record: !recording });

        playRecordBtn.onclick = () =>
            applyTransportChange({
                play: getTransportState() !== "PLAY_RECORD",
                record: getTransportState() !== "PLAY_RECORD"
            });


        // ==========================
        // INITIALIZATION
        // ==========================
        setupSoloBtns();
        updateMeter();
        syncTimelineOverlayWidth();
        syncTimelineOverlay();
        renderTimelineRuler();

        // ==========================
        // END OF SCRIPT
        // ==========================


    </script>

</body>
