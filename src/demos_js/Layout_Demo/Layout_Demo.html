<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BareTrack/AudioPad/WaveStack - Layout Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="menu-bar">
        <div class="menu">
            <span class="menu-label">File</span>
            <div class="menu-pop">
                <div>New Project</div>
                <div>Open Project</div>
                <div>Save Project</div>
            </div>
        </div>

        <div class="menu">
            <span class="menu-label">Settings</span>
            <div class="menu-pop">
                <div data-theme="studio">Theme: Studio</div>
                <div data-theme="dark">Theme: Dark</div>
                <div data-theme="light">Theme: Light</div>
                <div data-theme="Ice">Theme: Ice</div>
                <div data-theme="Fire">Theme: Fire</div>
                <div data-theme="Earth">Theme: Earth</div>
                <div data-theme="Wind">Theme: Wind</div>
                <div data-theme="Sol">Theme: Sol</div>
                <hr />
                <div data-ruler="seconds">Ruler Mode: Seconds</div>
                <div data-ruler="bars">Ruler Mode: Bars</div>
            </div>
        </div>
    </div>


    <div class="transport">

        <div id="transport-scenes">
            <button class="transport-scene">A</button>
            <button class="transport-scene">B</button>
            <button class="transport-scene">C</button>
            <button class="transport-scene">D</button>
            <button class="transport-scene">E</button>

            <button class="transport-scene-clear" aria-label="Clear global scene" title="Clear scene selection">
                X
            </button>

        </div>


        <div class="metronome-scan">
            <div class="metronome-line"></div>
        </div>

        <button id="returnToBeginningBtn" aria-label="Return to beginning" title="Return to beginning">
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                <rect x="1" y="2" width="2" height="10" fill="currentColor" />
                <polygon points="12,2 4,7 12,12" fill="currentColor" />
            </svg>
        </button>

        <button id="playBtn" aria-label="Play">
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                <polygon points="3,2 12,7 3,12" fill="currentColor" />
            </svg>
        </button>


        <button id="recordBtn" class="record-btn" aria-label="Record">
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                <circle cx="7" cy="7" r="5" fill="currentColor" />
            </svg>
        </button>


        <div class="timer" id="timer">00:00.0</div>


        <div class="global-time">

            <div class="tempo" id="tempoDisplay" contenteditable="true" spellcheck="false">
                125
            </div><span class="unit"> BPM</span>

            <div class="timesig-wrapper">
                <button id="timeSigBtn" class="timesig-btn" aria-haspopup="true" aria-expanded="false">
                    4/4
                </button>

                <div id="timeSigMenu" class="timesig-menu">
                    <button data-beats="4" data-note="4">4/4</button>
                    <button data-beats="3" data-note="4">3/4</button>
                    <button data-beats="2" data-note="4">2/4</button>
                    <button data-beats="6" data-note="8">6/8</button>
                    <button data-beats="12" data-note="8">12/8</button>
                    <button data-beats="5" data-note="4">5/4</button>
                    <button data-beats="7" data-note="8">7/8</button>
                </div>
            </div>

        </div>



        <div class="zoom-container">
            <div class="zoom-slider-wrap">
                <input id="zoom-slider" type="range" min="0" max="4" step="1" value="2" />

                <div class="zoom-labels">
                    <span data-pos="0">¼</span>
                    <span data-pos="1">½</span>
                    <span data-pos="2">1x</span>
                    <span data-pos="3">2x</span>
                    <span data-pos="4">4x</span>
                </div>
            </div>
        </div>

        <div class="meter" id="meter">
            <div class="meter-bar" id="meterBar"></div>
        </div>
    </div>


    <div class="layout-root">
        <div id="controls-column">
            <div id="controls-column-spacer">

                <div class="marker-transport">
                    <button id="marker-add" title="Add marker at playhead">
                        <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
                            <line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>

                    <button id="marker-first">|◀</button>
                    <button id="marker-prev">◀</button>

                    <div id="marker-time" class="marker-time" title="Go to marker">—</div>

                    <button id="marker-next">▶</button>
                    <button id="marker-last">▶|</button>

                    <button id="marker-delete" disabled>⨯</button>
                </div>

            </div>
            <div id="controls-scroll-column"></div>
        </div>


        <div id="timeline-area">
            <div id="timeline-inner">

                <!-- TIMELINE RULER NOW LIVES INSIDE SCROLLING SPACE -->
                <div id="timeline-ruler" class="timeline-ruler">
                    <div class="timeline-ruler-inner">
                        <canvas id="timeline-ruler-canvas"></canvas>
                        <div id="record-range"></div>
                        <div id="timeline-markers"></div>
                    </div>
                </div>

                <!-- OVERLAY (PLAYHEAD + RECORD RANGE) -->
                <div id="timeline-overlay">
                    <div id="playhead"></div>
                    <!-- <div id="record-range"></div> -->
                </div>

                <!-- TRACK CONTENT -->
                <div id="timeline-column"></div>

            </div>
        </div>
    </div>


    <template id="control-row-template">
        <div class="control-row">
            <div class="row-inner">
                <div class="track-controls">
                    <div class="track-title" contenteditable="true"></div>
                    <button class="solo-btn">S</button>
                    <button class="delete-btn" aria-label="Delete track">⨯</button>
                </div>
                <input type="range" class="gain-slider" min="0" max="100" value="80" />

                <div class="track-scenes">
                    <button class="track-scene">A</button>
                    <button class="track-scene">B</button>
                    <button class="track-scene">C</button>
                    <button class="track-scene">D</button>
                    <button class="track-scene">E</button>
                    <button class="track-scene-clear" aria-label="Clear track scenes">
                        clear
                    </button>
                </div>




            </div>
        </div>
    </template>

    <template id="timeline-row-template">
        <div class="timeline-row">
            <div class="row-inner"></div>
        </div>
    </template>

    <div id="debug-transport-state"></div>


<script src="./trackNames.js"></script>
<script src="./onboarding.js"></script>
<script src="./index.js"></script>

</body>

</html>
