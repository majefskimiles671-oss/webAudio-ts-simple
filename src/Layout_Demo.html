## [Project Definition](/Rules/Project_Definition.md)

- in-browser DAW that has UI similar to Ableton Live  or Reaper
- can record from the laptop microphone
- playback multiple tracks simultaneously
- possibly allow playback through headphones while recording through the laptop microphone
- save multitrack projects to local computer (maybe cloud storage later)
- possibly add functionality for editing a single project by two or more people remotely.

## Purpose

- learning technologies that will help me stay current
- possibly making a tool I can use personaly or share with others

## Technologies

- Chrome, Safari, Edge
- HTML, CSS, Javascript all in one file

## Philosophy

- simple is better than complex
- good architecture, but not so fancy that I can't understand it
- features should be few, but they should be well-built

## Notes

 - this is just a demo app for learning, but I still want to do things "the right way"

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BareTrack/AudioPad/WaveStack - Layout Demo</title>

    <style>
        /* Structural CSS */
        :root {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;
            --bg-button: #828282;

            --text-main: #eee;
            --text-muted: #aaa;
            --text-button: #2f2f2f;

            --accent-primary: #ff9500;
            --accent-danger: #ff3b30;
            --accent-highlight: #ffd400;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;

            --border-subtle: #6b6b6b;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            background: var(--bg-app);
            color: var(--text-main);
        }

        button {
            background: var(--bg-button);
            border: 1px solid var(--border-subtle);
            color: var(--text-button);
        }

        /* ----- Prevent Text Selection on Interactive UI ----- */
        .marker-transport,
        .menu-bar,
        .transport,
        #timeline-area,
        .timeline-ruler,
        #timeline-overlay,
        button,
        input[type="range"] {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        .track-title,
        .lyrics-editor {
            user-select: text;
        }

        /* Main Transport */

        .transport {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);

        }

        .transport button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .transport button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }


        #transport-scenes {
            display: flex;
            gap: 8px;
        }

        .transport-scenes button {
            /* width: 22px; */
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            /* background: var(--bg-surface); */
            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            cursor: pointer;
        }

        .transport-scene.active {
            background: var(--accent-highlight);
            color: black;
        }

        /* need to implement the js  */
        .track.not-in-scene {
            opacity: 0.35;
        }

        .transport-scene-clear {
            margin-left: 6px;
            padding: 4px 8px;

            background: transparent;
            border: 1px solid var(--border-subtle);
            border-radius: 4px;

            color: var(--text-muted);
            cursor: pointer;
            opacity: 0.75;
        }

        .transport-scene-clear:hover {
            opacity: 1;
            color: var(--text-main);
        }

        .record-btn.recording {
            background: #ff3b30;
            color: var(--text-main);
        }


        #playBtn.active {
            background: var(--accent-primary);
            color: var(--text-main);
        }


        #playRecordBtn {
            border-radius: 6px 10px 10px 6px;
            padding: 5px;
        }

        #playRecordBtn.active {
            box-shadow:
                inset 0 0 0 2px rgba(0, 0, 0, 0.35);

            background: linear-gradient(90deg,
                    var(--accent-primary) 0%,
                    var(--accent-primary) 30%,
                    color-mix(in oklab, var(--accent-primary), var(--accent-danger)) 50%,
                    var(--accent-danger) 70%,
                    var(--accent-danger) 100%);

        }



        /* ----- Global Time ----- */

        .global-time {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 4px 8px;
        }

        /* ----- Time Signature Dropdown ----- */

        .timesig-wrapper {
            position: relative;
        }

        .timesig-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-main);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .timesig-btn:hover {
            background: var(--bg-panel);
        }

        .timesig-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 4px;
            padding: 4px;
            display: none;
            flex-direction: column;
            gap: 2px;
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            z-index: 1000;
            min-width: 36px;
        }

        .timesig-menu button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            text-align: center;
            font-size: 12px;
            color: var(--text-main);
            border-radius: 4px;
        }

        .timesig-menu button:hover {
            background: var(--bg-surface);
        }

        /* Open state */
        .timesig-wrapper.open .timesig-menu {
            display: flex;
        }

        /* Prevent text selection */
        .timesig-btn,
        .timesig-menu {
            user-select: none;
        }

        .tempo {
            padding: 5px;
        }



        /* Metronome */
        .metronome-scan {
            position: relative;
            width: 80px;
            height: 18px;
            background-color: var(--bg-surface);

            background-image: repeating-linear-gradient(90deg,
                    var(--text-button),
                    var(--text-button) 2px,
                    transparent 2px,
                    transparent 20px);

            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            overflow: hidden;
        }

        .metronome-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-primary);
        }






        /* Timer */

        .timer {
            font-variant-numeric: tabular-nums;
            min-width: 80px;
        }

        /* Meter */

        .meter {
            width: 120px;
            height: 10px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            display: none;
            margin-left: auto;
        }

        .meter.active {
            display: block;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4cd964, #ffd400, #ff3b30);
            transition: width 0.1s linear;
        }


        /* Layout */

        .layout-root {
            flex: 1;
            display: grid;
            grid-template-columns: 220px 1fr;
            overflow: hidden;
        }

        /* Controls column */

        #controls-column {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #controls-column-spacer {
            height: 32px;
            /* must match ruler height */
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-panel);
        }

        #controls-scroll-column {
            background: var(--bg-app);
            overflow-y: hidden;
        }

        .control-row {
            padding: 0px;
            box-sizing: border-box;
        }


        /* Timeline Markers */

        #timeline-markers {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .marker-time {
            display: inline;
        }

        #timeline-markers {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* markers override this */
            z-index: 20;
            /* MUST be above the canvas */
        }

        /* The wrapper — receives the clicks */
        .timeline-marker-hit {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 14px;
            /* BIG target */
            transform: translateX(-7px);
            pointer-events: auto;
            /* OVERRIDES parent setting */
            cursor: pointer;
            background: rgba(255, 0, 0, 0);
            /* TEMP DEBUG — will remove */
        }

        /* The actual visible line (tiny) */
        .timeline-marker-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            transform: translateX(-1px);
            background: var(--accent-highlight);
        }

        .timeline-marker-hit:hover .timeline-marker-line {
            background: var(--accent-primary);
            width: 3px;
        }

        .timeline-marker-line.selected {
            /* background-color: var(--accent-primary); */
            box-shadow: #FFF 0 -1px 4px, #ff0 0 -2px 10px, #ff8000 0 -10px 20px, red 0 -18px 40px, 5px 5px 15px 5px rgba(0, 0, 0, 0);
        }



        /* Track name */

        .track-title {
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-title:hover {
            background: var(--bg-panel);
        }

        .track-title:focus {
            outline: 1px solid #ff9500;
            background: var(--bg-surface);
        }

        .track-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .track-controls .solo-btn {
            margin-left: auto;
        }

        .solo-btn {
            padding: 2px 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .solo-btn.active {
            background: #ffd400;
            color: var(--text-main);
        }


        .solo-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .gain-slider {
            width: 100%;
        }

        .track-scenes {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .track-scene {
            min-width: 18px;
            height: 18px;
            border-radius: 3px;
            font-size: 11px;
            line-height: 18px;
            text-align: center;

            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            cursor: pointer;
        }

        .track-scene.active {
            background: var(--accent-primary);
            color: black;
            border-color: var(--accent-primary);
        }

        /* ⨯ clear button */
        .track-scene-clear {
            margin-left: 4px;
            font-size: 12px;
            line-height: 18px;

            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0.6;
        }

        .track-scene-clear:hover {
            opacity: 1;
            color: var(--text-main);
        }




        /* Zoom slider */

        #zoom-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 20px;
            background: transparent;
            margin: 0;
        }

        .zoom-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 140px;
        }

        .zoom-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
        }

        .zoom-labels span {
            cursor: default;
        }

        #zoom-slider::-webkit-slider-runnable-track {
            height: 4px;
            background: var(--bg-panel);
            border-radius: 2px;
            border: 1px solid var(--border-subtle);
        }

        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-primary);
            border: 2px solid var(--bg-app);
            margin-top: -6px;
            /* centers thumb on track */
            cursor: pointer;
        }

        #zoom-slider:hover::-webkit-slider-thumb,
        #zoom-slider:focus-visible::-webkit-slider-thumb {
            background: var(--accent-highlight);
        }

        .zoom-slider-wrap {
            position: relative;
            width: 140px;
        }

        .zoom-labels {
            position: relative;
            height: 14px;
            margin-top: 4px;
        }

        .zoom-labels span {
            position: absolute;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .zoom-labels span[data-pos="0"] {
            left: 0%;
            transform: translateX(0);
        }

        .zoom-labels span[data-pos="1"] {
            left: 25%;
        }

        .zoom-labels span[data-pos="2"] {
            left: 50%;
        }

        .zoom-labels span[data-pos="3"] {
            left: 75%;
        }

        .zoom-labels span[data-pos="4"] {
            left: 100%;
            transform: translateX(-100%);
        }



        /* Timeline */

        .timeline-ruler {
            height: 32px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .timeline-ruler-inner {
            position: relative;
            height: 100%;
        }

        #timeline-ruler-canvas {
            height: 100%;
            width: 100%;
            display: block;
        }

        #timeline-inner {
            position: relative;
            width: max-content;
            overflow: visible;
        }

        #timeline-area {
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
            background: var(--bg-surface);
            overscroll-behavior: none;
        }

        #timeline-overlay {
            position: absolute;
            top: 32px;
            /* height of timeline-ruler */
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .timeline-row {
            padding: 0px;
            box-sizing: border-box;
        }

        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ff9500;
            z-index: 10;
        }

        #record-range {
            position: absolute;
            left: 0;
            bottom: 0;
            height: 2px;
            background: var(--accent-danger);
            pointer-events: none;
            background: var(--accent-danger);
            opacity: 0.85;
        }

        /* Inside timeline-row and control-row */
        .row-inner {
            padding: 8px;
        }



        /* Waverform */

        .waveform {
            display: inline-block;
            height: 80px;
            background-color: var(--bg-surface);

            background-image: repeating-linear-gradient(90deg,
                    var(--waveform-a),
                    var(--waveform-a) 20px,
                    var(--waveform-b) 20px,
                    var(--waveform-b) 40px);
        }

        .waveform-canvas {
            display: block;
            height: 100%;
        }
    </style>

            outline: 2px solid #4cd964;
        }

        body.debug #timeline-overlay {
            outline: 2px dashed #ffd400;
        }

        body.debug .control-row {
            outline: 1px dashed #ff3b30;
        }

        body.debug .timeline-row {
            outline: 1px dashed #4cd964;
        }
    </style>
</head>

                <!-- TIMELINE RULER NOW LIVES INSIDE SCROLLING SPACE -->

    <template id="control-row-template">

                </div>
                <input type="range" class="gain-slider" min="0" max="100" value="80" />

                <div class="track-scenes">
                    <button class="track-scene">A</button>
                    <button class="track-scene">B</button>
                    <button class="track-scene">C</button>
                    <button class="track-scene">D</button>
                    <button class="track-scene">E</button>
                    <button class="track-scene-clear" aria-label="Clear track scenes">
                        clear
                    </button>
                </div>




            </div>
        </div>
    </template>

    <template id="timeline-row-template">
        <div class="timeline-row">
            <div class="row-inner">
                <div class="waveform">
                    <canvas class="waveform-canvas" height="80"></canvas>
                </div>
            </div>
        </div>
    </template>

    <div id="debug-transport-state"></div>



    <script>

        // ============================================================
        // Code Awaiting Organization -----
        // ============================================================





        // ============================================================
        // Shared DOM Referneces -----
        // ============================================================

        const controlsScrollCol = document.getElementById("controls-scroll-column");
        const timelineArea = document.getElementById("timeline-area");
        const timelineInner = document.getElementById("timeline-inner");

        // ============================================================
        // State (Truth Layer) -----
        // ============================================================

        //  Constants 
        const BASE_PPS = 100;
        const SCROLL_THRESHOLD = 120;

        //  Zoom State 
        const zoomLevels = [0.25, 0.5, 1, 2, 4];
        let zoomIndex = 2;           // default = 1x
        let zoom = zoomLevels[zoomIndex];

        let currentTimeSeconds = 0;
        let recordStartTime = null;

        //  Global Musical State 
        let tempoBPM = 125;
        let timeSignature = {
            beats: 3,
            noteValue: 4
        };

        let markers = [{ id: 0, time: 0 }]; // [{ id, time }]
        let selectedMarkerId = null;

        //  Musical Grid 
        let bpm = 120;         // beats per minute
        let beatsPerBar = 4;  // time signature numerator

        //  Transport State 
        let playing = false;
        let recording = false;
        let startTime = 0;
        let recordStartX = null;
        let playbackStartX = 0; // px offset where playback begins

        // ============================================================
        // Helpers (Pure Computation Layer) -----
        // ============================================================

        // ----- Marker Navigation Helpers 
        function jumpPlayheadToTime(seconds) {
            const px = secondsToPixels(seconds);
            setPlayheadPositionPx(px);
        }

        function secondsToPixels(seconds) {
            return seconds * BASE_PPS * zoom;
        }

        function pixelsToSeconds(px) {
            return px / (BASE_PPS * zoom);
        }

        // ----- Marker Helpers 
        function getSelectedMarkerIndex() {
            return markers.findIndex(m => m.id === selectedMarkerId);
        }

        function secondsPerBeat() {
            return 60 / bpm;
        }

        function secondsPerBar() {
            return secondsPerBeat() * beatsPerBar;
        }


        function getRulerTicks(startSeconds, endSeconds) {
            if (rulerMode === "seconds") {
                return getSecondTicks(startSeconds, endSeconds);
            }
            if (rulerMode === "bars") {
                return getBarTicks(startSeconds, endSeconds);
            }
        }


        function getSecondTicks(startSeconds, endSeconds) {
            const majorStep =
                zoom <= 0.5 ? 4 :
                    zoom <= 1 ? 2 :
                        zoom <= 2 ? 1 : 0.5;

            const minorStep = majorStep / 4;
            const ticks = [];

            for (
                let t = Math.floor(startSeconds / minorStep) * minorStep;
                t <= endSeconds;
                t += minorStep
            ) {
                ticks.push({
                    time: t,
                    major: Math.abs(t % majorStep) < 0.0001,
                    label: Math.abs(t % majorStep) < 0.0001
                        ? formatTime(t)
                        : null
                });
            }

            return ticks;
        }

        function getBarTicks(startSeconds, endSeconds) {
            const barLength = secondsPerBar();
            const beatLength = secondsPerBeat();
            const ticks = [];

            const startBar =
                Math.floor(startSeconds / barLength);

            let t = startBar * barLength;

            while (t <= endSeconds) {
                // Major bar tick
                ticks.push({
                    time: t,
                    major: true,
                    label: `Bar ${startBar + 1}`
                });

                // Beat ticks
                for (let b = 1; b < beatsPerBar; b++) {
                    const bt = t + b * beatLength;
                    if (bt >= startSeconds && bt <= endSeconds) {
                        ticks.push({
                            time: bt,
                            major: false,
                            label: null
                        });
                    }
                }

                t += barLength;
            }

            return ticks;
        }

        function isTransportMoving() {
            return getTransportState() !== "IDLE";
        }

        // tiny state machine
        // Use getTransportState() to explain behavior, not to control everything.
        /** 
         * State mutations change flags.
         * Transition detection decides behavior.
         **/
        function getTransportState() {
            if (playing && recording) return "PLAY_RECORD";
            if (playing) return "PLAY";
            if (recording) return "RECORD";
            return "IDLE";
        }

        function getPlayheadX() {
            const transform = playhead.style.transform;
            if (!transform) {
                console.log("Returning 0 because !transform");
                return 0;
            }

            const match = transform.match(/translateX\(([-\d.]+)px\)/);
            return match ? parseFloat(match[1]) : 0;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            const t = Math.floor((s * 10) % 10);
            return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${t}`;
        }

        function computeWaveformWidth(seconds) {
            return Math.floor(seconds * BASE_PPS * zoom);
        }

        // ----- Playhead View Helpers 
        function ensurePlayheadInViewCentered() {
            const playheadX = secondsToPixels(currentTimeSeconds);
            const viewLeft = timelineArea.scrollLeft;
            const viewRight = viewLeft + timelineArea.clientWidth;

            // // Offscreen to the left OR right → center it
            // if (playheadX < viewLeft || playheadX > viewRight) {
            //     timelineArea.scrollLeft =
            //         Math.max(0, playheadX - timelineArea.clientWidth / 2);
            // }


            const MARGIN = 40;
            if (
                playheadX < viewLeft + MARGIN ||
                playheadX > viewRight - MARGIN
            ) {
                timelineArea.scrollLeft =
                    Math.max(0, playheadX - timelineArea.clientWidth / 2);
            }

        }

        // ============================================================
        // Authority (Meaning Layer) -----
        // ============================================================

        function setRulerMode(mode) {
            rulerMode = mode;
            renderTimelineLayer();
        }

        // ----- Marker Selection 
        function selectMarkerByIndex(index) {
            if (!markers.length) return;

            // Clamp index to valid range
            const clamped = Math.max(0, Math.min(index, markers.length - 1));
            const marker = markers[clamped];

            // Update selected marker ID
            selectedMarkerId = marker.id;

            // Move playhead to marker time
            jumpPlayheadToTime(marker.time);

            // ----- Auto‑Scroll to Marker 
            const markerX = secondsToPixels(marker.time);
            const viewWidth = timelineArea.clientWidth;

            // Center the marker in the viewport
            const targetScrollLeft = markerX - viewWidth / 2;
            timelineArea.scrollLeft = Math.max(0, targetScrollLeft);

            // ----- Re-render the marker layer 
            renderMarkers();

            // ----- Re-render marker transport controls 
            renderMarkerTransport();
        }

        //  -----------Apply Transport Change 
        function applyTransportChange({ play, record }) {
            const prevState = getTransportState();
            const wasRecording = recording;

            playing = play;
            recording = record;

            const nextState = getTransportState();

            if (prevState === "IDLE" && nextState !== "IDLE") {
                onTransportStart();
            }

            if (prevState !== "IDLE" && nextState === "IDLE") {
                // if (!isScrubbing) {
                //     resetPlayhead();
                // }
            }

            if (!wasRecording && recording) startRecordingRange();
            if (wasRecording && !recording) clearRecordingRange();

            syncTransportUI();
        }

        // ============================================================
        // Projection / Rendering (View Layer -----
        // ============================================================

        // Recording range
        const recordRange =
            document.getElementById("record-range");

        function startRecordingRange() {
            recordStartTime = getPlayheadTime(); // seconds
            recordRange.style.display = "block";
            recordRange.style.width = "0px";
        }


        function getPlayheadTime() {
            const x = getPlayheadX();
            return pixelsToSeconds(x);
        }


        function updateRecordRange() {
            if (recordStartTime === null) return;

            const currentTime = getPlayheadTime();

            const startX = secondsToPixels(recordStartTime);
            const endX = secondsToPixels(currentTime);

            recordRange.style.left = `${startX}px`;
            recordRange.style.width = `${Math.max(0, endX - startX)}px`;
        }


        function clearRecordingRange() {
            recordRange.style.display = "none";
            recordStartX = null;
        }

        // Timeline Ruler
        const rulerCanvas = document.getElementById("timeline-ruler-canvas");
        const rulerCtx = rulerCanvas.getContext("2d");

        function renderTimelineLayer() {
            renderTimelineRuler();
            renderMarkers();
        }

        function renderTimelineRuler() {

            const style = getComputedStyle(document.body);

            const textMain =
                style.getPropertyValue("--text-main").trim();

            const textMuted =
                style.getPropertyValue("--text-muted").trim();

            const borderSubtle =
                style.getPropertyValue("--border-subtle").trim();

            const accentPrimary =
                style.getPropertyValue("--accent-Primary").trim();


            const contentWidth = timelineInner.scrollWidth;
            const viewWidth = timelineArea.clientWidth;

            const rulerHeight = 32;

            // Canvas sizing (authoritative)
            rulerCanvas.style.height = `${rulerHeight}px`;
            rulerCanvas.width = contentWidth;
            rulerCanvas.height = rulerHeight;

            const height = rulerCanvas.height;

            rulerCtx.clearRect(0, 0, contentWidth, height);

            const scrollLeft = timelineArea.scrollLeft;
            const startSeconds = pixelsToSeconds(scrollLeft);
            const endSeconds = pixelsToSeconds(scrollLeft + viewWidth);

            rulerCtx.font = "10px monospace";
            rulerCtx.fillStyle = textMuted;

            let ticks = [];

            // ==========================
            // TICK GENERATION
            // ==========================

            if (rulerMode === "seconds") {

                const majorStep =
                    zoom <= 0.5 ? 4 :
                        zoom <= 1 ? 2 :
                            zoom <= 2 ? 1 : 0.5;

                const minorStep = majorStep / 4;

                for (
                    let t = Math.floor(startSeconds / minorStep) * minorStep;
                    t <= endSeconds;
                    t += minorStep
                ) {
                    ticks.push({
                        time: t,
                        major: Math.abs(t % majorStep) < 0.0001,
                        label:
                            Math.abs(t % majorStep) < 0.0001
                                ? formatTime(t)
                                : null
                    });
                }

            } else if (rulerMode === "bars") {

                const barLen = secondsPerBar();
                const beatLen = secondsPerBeat();

                const firstBar =
                    Math.floor(startSeconds / barLen);

                let barTime = firstBar * barLen;

                while (barTime <= endSeconds) {

                    // Major bar tick
                    ticks.push({
                        time: barTime,
                        major: true,
                        label: `Bar ${firstBar + 1 + ((barTime - firstBar * barLen) / barLen)}`
                    });

                    // Beat ticks
                    for (let b = 1; b < beatsPerBar; b++) {
                        const bt = barTime + b * beatLen;
                        if (bt >= startSeconds && bt <= endSeconds) {
                            ticks.push({
                                time: bt,
                                major: false,
                                label: null
                            });
                        }
                    }

                    barTime += barLen;
                }
            }

            // ==========================
            // TICK RENDERING
            // ==========================

            for (const tick of ticks) {
                const x = secondsToPixels(tick.time);

                if (tick.major) {
                    rulerCtx.strokeStyle = textMain;
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, 8);
                    rulerCtx.stroke();

                    if (tick.label) {
                        rulerCtx.fillText(tick.label, x + 2, 10);
                    }
                } else {
                    rulerCtx.strokeStyle = borderSubtle;
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, height - 6);
                    rulerCtx.stroke();
                }
            }

            // ==========================
            // PLAYHEAD LINE
            // ==========================

            if (getTransportState() !== "IDLE") {
                const playheadX = getPlayheadX();

                rulerCtx.strokeStyle = accentPrimary;
                rulerCtx.lineWidth = 1;

                rulerCtx.beginPath();
                rulerCtx.moveTo(playheadX + 0.5, 0);
                rulerCtx.lineTo(playheadX + 0.5, height);
                rulerCtx.stroke();
            }
        }





        function renderMetronomeScan() {
            if (getTransportState() === "IDLE") return;

            const t = getPlayheadTime();        // seconds
            const spb = secondsPerBeat();       // already defined


            const spbar = secondsPerBar();
            const phase = (t / spbar) % 1; // bar mode


            // const phase = (t / spb) % 1;   // beat mode     // 0 → 1 per beat

            const scan = document.querySelector(".metronome-scan");
            const line = scan.querySelector(".metronome-line");

            const width = scan.clientWidth;
            const x = phase * width;

            // blink at beginning of phase
            if (phase < 0.03) {
                line.style.opacity = "1";
                line.style.width = "3px";
            } else {
                line.style.opacity = "0.7";
                line.style.width = "2px";
            }


            line.style.transform = `translateX(${x}px)`;
        }

        // ----- Debug Event Target Overlay 
        function debugOverlayEventTarget(e, duration = 400) {
            const el = e.target;
            if (!(el instanceof HTMLElement)) return;

            const rect = el.getBoundingClientRect();
            const overlay = document.createElement("div");

            overlay.style.position = "fixed";
            overlay.style.left = `${rect.left}px`;
            overlay.style.top = `${rect.top}px`;
            overlay.style.width = `${rect.width}px`;
            overlay.style.height = `${rect.height}px`;
            overlay.style.border = "2px solid red";
            overlay.style.pointerEvents = "none";
            overlay.style.zIndex = "99999";

            document.body.appendChild(overlay);

            setTimeout(() => overlay.remove(), duration);
        }

        // ----- Playhead Helpers 
        function setPlayheadPositionPx(px) {
            playhead.style.transform = `translateX(${px}px)`;
            currentTimeSeconds = pixelsToSeconds(px);
            timer.textContent = formatTime(currentTimeSeconds);
            updateTimeDisplay(currentTimeSeconds);
        }

        function updateTimeDisplay(s) {
            timer.textContent = formatTime(s);
        }

        function renderTempo() {
            const el = document.getElementById("tempoDisplay");
            el.innerHTML = `${tempoBPM}`;
        }

        function renderTimeSignature() {
            timeSigBtn.textContent =
                `${timeSignature.beats}/${timeSignature.noteValue}`;
        }

        const markersLayer = document.getElementById("timeline-markers");

        function renderMarkers() {
            // Clear old marker DOM
            markersLayer.innerHTML = "";

            for (const marker of markers) {

                const markerWrap = document.createElement("div");
                markerWrap.className = "timeline-marker-hit";

                const markerLine = document.createElement("div");
                markerLine.className = "timeline-marker-line";

                if (marker.id === selectedMarkerId) {
                    markerLine.classList.add("selected");
                    markerWrap.classList.add("selected");
                }

                markerWrap.appendChild(markerLine);

                // position marker
                const x = secondsToPixels(marker.time);
                markerWrap.style.left = `${x}px`;

                // ✅ CLICK → LOAD MARKER
                markerWrap.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectedMarkerId = marker.id;
                    renderMarkers();
                    renderMarkerTransport();
                });

                // (drag comes later; keep click-only for now)
                markersLayer.appendChild(markerWrap);

            }
        }

        // ----- Marker Transport Rendering
        // ----- Marker Transport Controls 
        const markerFirstBtn = document.getElementById("marker-first");
        const markerPrevBtn = document.getElementById("marker-prev");
        const markerNextBtn = document.getElementById("marker-next");
        const markerLastBtn = document.getElementById("marker-last");
        const markerDeleteBtn = document.getElementById("marker-delete");

        function renderMarkerTransport() {
            const idx = getSelectedMarkerIndex();
            const hasMarkers = markers.length > 0;

            markerFirstBtn.disabled = !hasMarkers || idx === 0;
            markerPrevBtn.disabled = !hasMarkers || idx <= 0;
            markerNextBtn.disabled = !hasMarkers || idx === -1 || idx === markers.length - 1;
            markerLastBtn.disabled = !hasMarkers || idx === markers.length - 1;
            markerDeleteBtn.disabled = idx === -1;

            const display = document.getElementById("marker-time");
            if (idx === -1) {
                display.textContent = "—";
            } else {
                display.textContent = formatTime(markers[idx].time);
            }
        }

        function rerenderWaveforms() {
            /**
             * Make sure that every time you draw a waveform you do this first:
             * canvas.height = TRACK_HEIGHT;          // e.g. 80
             * canvas.style.height = `${TRACK_HEIGHT}px`;
             **/
            document.querySelectorAll(".timeline-row").forEach((row, i) => {
                const canvas = row.querySelector(".waveform-canvas");
                if (!canvas) return;

                const durationSeconds = 10 + i * 5;
                const waveformWidth = computeWaveformWidth(durationSeconds);

                const TRACK_HEIGHT = 80;
                canvas.width = waveformWidth;
                canvas.height = TRACK_HEIGHT;

                // Optional: redraw a fake waveform


                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // ctx.fillStyle = "#666";
                // ctx.fillRect(0, canvas.height / 2, canvas.width, 1);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        // ============================================================
        // DOM Sync (Synchronization Layer) -----
        // ============================================================

        // transport
        const playBtn = document.getElementById("playBtn");
        const playRecordBtn = document.getElementById("playRecordBtn");
        const recordBtn = document.getElementById("recordBtn");
        const playhead = document.getElementById("playhead");
        const timer = document.getElementById("timer");
        const meter = document.getElementById("meter");
        const meterBar = document.getElementById("meterBar");

        // debug
        const debugTransportState = document.getElementById("debug-transport-state");

        // ----- Scrub Helpers 
        function scrubToMouseEvent(e) {
            const innerRect = timelineInner.getBoundingClientRect();

            // Convert viewport X → content X
            const contentX =
                (e.clientX - innerRect.left);// + timelineArea.scrollLeft;

            const clampedX = Math.max(0, contentX);

            setPlayheadPositionPx(clampedX);
        }

        function syncTransportUI() {
            const state = getTransportState();

            playBtn.classList.toggle("active", state === "PLAY" || state === "PLAY_RECORD");
            recordBtn.classList.toggle("recording", state === "RECORD" || state === "PLAY_RECORD");
            playRecordBtn.classList.toggle("active", state === "PLAY_RECORD");
            meter.classList.toggle("active", state === "RECORD" || state === "PLAY_RECORD");


            // DEBUG OVERLAY
            if (document.body.classList.contains("debug")) {
                debugTransportState.textContent =
                    `Transport: ${state}`;
            }

        }

        //  Scroll / Geometry Sync 
        /**
         * This governs shared vertical scrolling, which is orthogonal to transport.
         * Why here
         * It’s not transport logic
         * It’s not UI rendering
         * It’s about input routing + geometry
         * Later, if bugs appear here, your brain knows exactly where to look.
         **/



        function syncTimelineOverlay() {
            const timelineColumn = document.getElementById("timeline-column");
            const timelineOverlay = document.getElementById("timeline-overlay");

            if (!timelineColumn || !timelineOverlay) return;

            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;

            timelineOverlay.style.height =
                `${timelineColumn.scrollHeight}px`;
        }

        const timelineColumn = document.getElementById("timeline-column");
        const timelineOverlay = document.getElementById("timeline-overlay");

        function syncTimelineOverlayWidth() {
            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;
        }

        // ============================================================
        // Event Handlers (Intent Layer)  -----
        // ============================================================

        // solo buttons
        function setupSoloBtns() {
            const soloButtons = Array.from(
                document.querySelectorAll(".solo-btn")
            );
            soloButtons.forEach(btn => {
                btn.addEventListener("click", () => {
                    const isActive = btn.classList.contains("active");

                    // Reset all
                    soloButtons.forEach(b => {
                        b.classList.remove("active");
                        b.disabled = false;
                    });

                    // If clicked button was not active, activate it and disable others
                    if (!isActive) {
                        btn.classList.add("active");
                        soloButtons.forEach(b => {
                            if (b !== btn) b.disabled = true;
                        });
                    }
                });
            });
        }

        document.querySelectorAll("[data-theme]").forEach(el => {
            el.onclick = () => {
                document.body.setAttribute("data-theme", el.dataset.theme);
                renderTimelineLayer();
            };
        });

        document.querySelectorAll("[data-ruler]").forEach(el => {
            el.onclick = () => {
                const mode = el.getAttribute("data-ruler");
                setRulerMode(mode);
            };
        });

        timelineArea.addEventListener("scroll", () => {
            renderTimelineLayer();
        });

        //  Ruler State 
        let rulerMode = "seconds"; // "seconds" | "bars"


        // ------------ Scrub State

        let isScrubbing = false;
        let scrubPrevTransportState = null; // "PLAY" | "IDLE


        timelineArea.addEventListener("mousedown", (e) => {
            if (recording) return; // scrubbing disabled while recording

            // Ignore clicks on markers (they already stopped propagation)
            isScrubbing = true;

            scrubPrevTransportState = getTransportState();

            // Temporarily stop transport
            if (scrubPrevTransportState !== "IDLE") {
                applyTransportChange({ play: false, record: false });
            }

            scrubToMouseEvent(e);
        });


        document.addEventListener("mousemove", (e) => {
            if (!isScrubbing) return;

            scrubToMouseEvent(e);
        });


        document.addEventListener("mouseup", () => {
            if (!isScrubbing) return;

            isScrubbing = false;

            if (scrubPrevTransportState === "PLAY") {
                applyTransportChange({ play: true, record: false });
            }

            scrubPrevTransportState = null;
        });

        const tempoEl = document.getElementById("tempoDisplay");

        tempoEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                tempoEl.blur();
            }
        });

        tempoEl.addEventListener("blur", () => {
            const raw = tempoEl.textContent.replace(/\D/g, "");
            const next = parseInt(raw, 10);

            if (!Number.isNaN(next)) {
                tempoBPM = Math.min(300, Math.max(30, next));
            }

            bpm = tempoBPM;
            renderTempo();
        });

        // ----- Time Signature Dropdown 
        const timeSigBtn = document.getElementById("timeSigBtn");
        const timeSigMenu = document.getElementById("timeSigMenu");
        const timeSigWrapper = timeSigBtn.parentElement;

        timeSigBtn.addEventListener("click", (e) => {
            e.stopPropagation();

            const open = timeSigWrapper.classList.toggle("open");
            timeSigBtn.setAttribute("aria-expanded", String(open));
        });

        timeSigMenu.addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;

            const beats = Number(btn.dataset.beats);
            const noteValue = Number(btn.dataset.note);

            timeSignature = { beats, noteValue };

            // timeSigBtn.textContent = `${beats}/${noteValue}`;
            renderTimeSignature();
            timeSigWrapper.classList.remove("open");
            timeSigBtn.setAttribute("aria-expanded", "false");
        });

        document.addEventListener("click", () => {
            timeSigWrapper.classList.remove("open");
            timeSigBtn.setAttribute("aria-expanded", "false");
        });

        const timelineRuler = document.getElementById("timeline-ruler");

        // ---- Marker Handlers 
        timelineRuler.addEventListener("click", (e) => {

            const x = e.offsetX;
            const time = pixelsToSeconds(x);

            const marker = {
                id: crypto.randomUUID(),
                time
            };

            markers.push(marker);
            markers.sort((a, b) => a.time - b.time);

            selectedMarkerId = marker.id;

            renderMarkers();
            renderMarkerTransport();
        });

        // ----- Marker Deletion 
        markerDeleteBtn.addEventListener("click", () => {
            const idx = getSelectedMarkerIndex();
            if (idx === -1) return;

            // Remove the marker
            markers.splice(idx, 1);

            // Clear selection explicitly
            selectedMarkerId = null;

            // Re-render without selecting another marker
            renderMarkers();
            renderMarkerTransport();
        });



        markerFirstBtn.addEventListener("click", () => {
            if (!markers.length) return;
            selectMarkerByIndex(0);
        });


        markerPrevBtn.addEventListener("click", () => {
            const idx = getSelectedMarkerIndex();
            if (idx <= 0) return;
            selectMarkerByIndex(idx - 1);
        });


        markerNextBtn.addEventListener("click", () => {
            const idx = getSelectedMarkerIndex();
            if (idx === -1) return;
            selectMarkerByIndex(idx + 1);
        });



        markerLastBtn.addEventListener("click", () => {
            if (!markers.length) return;
            selectMarkerByIndex(markers.length - 1);
        });

        // Sync scrollTop from timeline → controls
        // Add this once, after you define timelineArea and controlsCol:
        timelineArea.addEventListener("scroll", () => {
            controlsScrollCol.scrollTop = timelineArea.scrollTop;

            // debug output
            if (document.body.classList.contains("debug")) {
                controlsScrollCol.dataset.scroll =
                    controlsScrollCol.scrollTop;
                timelineArea.dataset.scroll =
                    timelineArea.scrollTop;
            }
        });

        // add this js once
        controlsScrollCol.addEventListener("wheel", (e) => {
            timelineArea.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });

        const transportToggles =
            document.querySelectorAll("#transport-scenes .transport-scene");

        // linked toggle behavior
        transportToggles.forEach(btn => {
            btn.addEventListener("click", () => {
                transportToggles.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        const globalClearBtn =
            document.querySelector(".transport-scene-clear");

        globalClearBtn.addEventListener("click", () => {
            // 1. Clear UI state
            document
                .querySelectorAll(".transport-scene.active")
                .forEach(btn => btn.classList.remove("active"));

            // 2. Clear core state
            //   activeGlobalScene = null;

            // 3. Update track audibility
            //   updateSceneMask();
        });


        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                globalClearBtn.click();
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "d") {
                document.body.classList.toggle("debug");
            }
        });

        const zoomSlider = document.getElementById("zoom-slider");

        zoomSlider.oninput = () => {
            // ----- Preserve Center Time 
            const centerTime =
                timelineArea.scrollLeft / (BASE_PPS * zoom);

            // ----- Update Zoom 
            zoomIndex = parseInt(zoomSlider.value, 10);
            zoom = zoomLevels[zoomIndex];

            // ----- Re-render Timeline 
            rerenderWaveforms();
            syncTimelineOverlay();
            renderTimelineLayer();

            // ----- Restore Center Scroll 
            timelineArea.scrollLeft =
                centerTime * BASE_PPS * zoom;

            // ----- Re-project Playhead if Transport is Idle 
            if (getTransportState() === "IDLE") {
                const px = secondsToPixels(currentTimeSeconds);
                setPlayheadPositionPx(px);
            }
            ensurePlayheadInViewCentered();
        };

        playBtn.onclick = () =>
            applyTransportChange({ play: !playing, record: recording });

        recordBtn.onclick = () =>
            applyTransportChange({ play: playing, record: !recording });

        playRecordBtn.onclick = () =>
            applyTransportChange({
                play: getTransportState() !== "PLAY_RECORD",
                record: getTransportState() !== "PLAY_RECORD"
            });


        // ----- Scrub Handlers 
        timelineArea.addEventListener("mousedown", (e) => {
            if (recording) return;

            isScrubbing = true;
            scrubPrevTransportState = getTransportState();

            if (scrubPrevTransportState !== "IDLE") {
                applyTransportChange({ play: false, record: false });
            }

            scrubToMouseEvent(e);
        });


        document.addEventListener("mousemove", (e) => {
            if (!isScrubbing) return;
            scrubToMouseEvent(e);
        });


        document.addEventListener("mouseup", () => {
            if (!isScrubbing) return;

            isScrubbing = false;

            if (scrubPrevTransportState === "PLAY") {
                applyTransportChange({ play: true, record: false });
            }

            scrubPrevTransportState = null;
        });

        // ============================================================
        // Loops -----
        // ============================================================

        //  Transport Transitions 
        function onTransportStart() {
            playbackStartX = getPlayheadX(); // ← THIS is the fix
            startTime = performance.now();
            requestAnimationFrame(updatePlayhead);
        }


        // -------- Update Playhead 
        function updatePlayhead() {

            if (!playing) return;
            const elapsed = (performance.now() - startTime) / 1000;
            // const x = elapsed * BASE_PPS * zoom;
            const deltaX =
                elapsed * BASE_PPS * zoom;

            const x =
                playbackStartX + deltaX;

            if (x < 2) {
                console.log("setting playhead to 0");
            }

            playhead.style.transform = `translateX(${x}px)`;

            if (recording) {
                updateRecordRange();
            }

            // scroll
            const right = timelineArea.scrollLeft + timelineArea.clientWidth;
            if (x > right - SCROLL_THRESHOLD) {
                timelineArea.scrollLeft =
                    x - (timelineArea.clientWidth - SCROLL_THRESHOLD);
            }

            timer.textContent = formatTime(elapsed);
            renderTimelineLayer();
            renderMetronomeScan();
            requestAnimationFrame(updatePlayhead);
        }

        function updateMeter() {
            if (recording) {
                meterBar.style.width = `${20 + Math.random() * 80}%`;
            }
            requestAnimationFrame(updateMeter);
        }

        // ============================================================
        // Initialization -----
        // ============================================================

        const timelineCol = document.getElementById("timeline-column");
        for (let i = 0; i < 8; i++) {
            /* ----- Controls Row ----- */
            const controlTpl = document.getElementById("control-row-template");
            const controlFrag = controlTpl.content.cloneNode(true);
            const controlRow = controlFrag.querySelector(".control-row");
            const title = controlFrag.querySelector(".track-title");
            const soloBtn = controlFrag.querySelector(".solo-btn");

            title.textContent = `Track ${i + 1}`;
            title.spellcheck = false;

            title.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    title.blur();
                }
            });

            title.addEventListener("blur", () => {
                const t = title.textContent.trim();
                title.textContent = t === "" ? `Track ${i + 1}` : t;
            });

            controlFrag.querySelectorAll(".track-scene").forEach(btn => {
                btn.addEventListener("click", () => {
                    btn.classList.toggle("active");
                });
            });

            //scenes

            controlFrag
                .querySelector(".track-scene-clear")
                .addEventListener("click", (e) => {
                    const row = e.currentTarget.closest(".control-row");

                    row
                        .querySelectorAll(".track-scene.active")
                        .forEach(btn => btn.classList.remove("active"));
                });

            controlsScrollCol.appendChild(controlFrag);

            /* ----- Timeline Row ----- */

            const timelineTpl = document.getElementById("timeline-row-template");
            const timelineFrag = timelineTpl.content.cloneNode(true);
            const timelineRow = timelineFrag.querySelector(".timeline-row");
            const canvas = timelineFrag.querySelector(".waveform-canvas");

            const trackDurationSeconds = 10 + i * 5;
            canvas.width = computeWaveformWidth(trackDurationSeconds);

            timelineCol.appendChild(timelineFrag);

            /* ----- Height Sync ----- */

            const ro = new ResizeObserver(([e]) => {
                controlRow.style.height = `${e.contentRect.height}px`;
            });

            ro.observe(timelineRow);
        }

        document.body.setAttribute("data-theme", "light");
        setupSoloBtns();
        updateMeter();
        syncTimelineOverlayWidth();
        syncTimelineOverlay();
        renderTimelineLayer();
        renderTempo();
        renderTimeSignature();

    </script>

</body>

</html>
