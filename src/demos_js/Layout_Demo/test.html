<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle of Fifths</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-subtle: #12121a;
    --text: #e8e6e1;
    --text-dim: #7a7872;
    --accent: #d4a054;
    --accent-glow: #d4a05440;
    --major-base: #1a1a2e;
    --major-hover: #252540;
    --minor-base: #141420;
    --minor-hover: #1e1e35;
    --inner-base: #0f0f1a;
    --highlight-root: #d4a054;
    --highlight-dominant: #6a9fcc;
    --highlight-subdominant: #cc6a8a;
    --highlight-relative: #7acc6a;
    --ring-border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .grain-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    padding: 1rem;
    width: 100%;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }

  .canvas-wrapper {
    position: relative;
    width: min(80vw, 600px);
    height: min(80vw, 600px);
  }

  canvas {
    width: 100%;
    height: 100%;
    cursor: pointer;
    border-radius: 50%;
    transition: filter 0.3s;
  }

  .info-panel {
    width: 100%;
    max-width: 600px;
    min-height: 120px;
    background: var(--bg-subtle);
    border: 1px solid var(--ring-border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .info-panel.active {
    border-color: var(--accent);
    box-shadow: 0 0 40px var(--accent-glow);
  }

  .info-key-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .info-key-name.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .info-signature {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.3s 0.1s;
  }

  .info-signature.visible { opacity: 1; }

  .info-relations {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s 0.15s;
  }

  .info-relations.visible { opacity: 1; }

  .relation-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    border: 1px solid;
  }

  .relation-tag.dominant { color: var(--highlight-dominant); border-color: var(--highlight-dominant); background: #6a9fcc10; }
  .relation-tag.subdominant { color: var(--highlight-subdominant); border-color: var(--highlight-subdominant); background: #cc6a8a10; }
  .relation-tag.relative { color: var(--highlight-relative); border-color: var(--highlight-relative); background: #7acc6a10; }
  .relation-tag.root { color: var(--highlight-root); border-color: var(--highlight-root); background: #d4a05410; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    padding: 0.5rem 0 2rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .empty-state {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 0.9rem;
    color: var(--text-dim);
    text-align: center;
    padding: 0.5rem 0;
  }

  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--ring-border);
    border-radius: 6px;
    background: var(--bg-subtle);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .controls button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #d4a05410;
  }

  @media (max-width: 500px) {
    header { padding: 1.5rem 1rem 0.5rem; }
    .info-panel { padding: 1rem 1.2rem; min-height: 100px; }
    .info-key-name { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="grain-overlay"></div>

<header>
  <h1>Circle of <span>Fifths</span></h1>
  <p>Interactive Music Theory Explorer</p>
</header>

<div class="main-container">
  <div class="controls">
    <button id="btn-sound" class="active">Sound</button>
    <button id="btn-signatures">Key Signatures</button>
    <button id="btn-chords">Show Chords</button>
  </div>

  <div class="canvas-wrapper">
    <canvas id="circle"></canvas>
  </div>

  <div class="info-panel" id="info-panel">
    <div class="empty-state" id="empty-state">Click any key to explore</div>
    <div class="info-key-name" id="info-key-name"></div>
    <div class="info-signature" id="info-signature"></div>
    <div class="info-relations" id="info-relations"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--highlight-root)"></div>Selected</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--highlight-dominant)"></div>Dominant</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--highlight-subdominant)"></div>Subdominant</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--highlight-relative)"></div>Relative</div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────

const MAJOR_KEYS = ['C','G','D','A','E','B','G♭','D♭','A♭','E♭','B♭','F'];
const MINOR_KEYS = ['Am','Em','Bm','F♯m','C♯m','G♯m','E♭m','B♭m','Fm','Cm','Gm','Dm'];
const DIMINISHED = ['B°','F♯°','C♯°','G♯°','D♯°','A♯°','F°','C°','G°','D°','A°','E°'];

const KEY_SIGNATURES = {
  'C': 'No sharps or flats',
  'G': '1 sharp: F♯', 'D': '2 sharps: F♯ C♯', 'A': '3 sharps: F♯ C♯ G♯',
  'E': '4 sharps: F♯ C♯ G♯ D♯', 'B': '5 sharps: F♯ C♯ G♯ D♯ A♯',
  'G♭': '6 flats: B♭ E♭ A♭ D♭ G♭ C♭', 'D♭': '5 flats: B♭ E♭ A♭ D♭ G♭',
  'A♭': '4 flats: B♭ E♭ A♭ D♭', 'E♭': '3 flats: B♭ E♭ A♭',
  'B♭': '2 flats: B♭ E♭', 'F': '1 flat: B♭',
  'Am': 'No sharps or flats',
  'Em': '1 sharp: F♯', 'Bm': '2 sharps: F♯ C♯', 'F♯m': '3 sharps: F♯ C♯ G♯',
  'C♯m': '4 sharps: F♯ C♯ G♯ D♯', 'G♯m': '5 sharps: F♯ C♯ G♯ D♯ A♯',
  'E♭m': '6 flats: B♭ E♭ A♭ D♭ G♭ C♭', 'B♭m': '5 flats: B♭ E♭ A♭ D♭ G♭',
  'Fm': '4 flats: B♭ E♭ A♭ D♭', 'Cm': '3 flats: B♭ E♭ A♭',
  'Gm': '2 flats: B♭ E♭', 'Dm': '1 flat: B♭',
};

const CHORD_TONES = {
  'C': ['I','IV','V','ii','iii','vi','vii°'],
  'G': ['I','IV','V','ii','iii','vi','vii°'],
  'D': ['I','IV','V','ii','iii','vi','vii°'],
};

// Frequencies for Web Audio (octave 4)
const NOTE_FREQ = {
  'C': 261.63, 'D': 293.66, 'E': 329.63, 'F': 349.23,
  'G': 392.00, 'A': 440.00, 'B': 493.88,
  'C♯': 277.18, 'D♯': 311.13, 'F♯': 369.99, 'G♯': 415.30, 'A♯': 466.16,
  'D♭': 277.18, 'E♭': 311.13, 'G♭': 369.99, 'A♭': 415.30, 'B♭': 466.16,
};

function getFreq(keyName) {
  const base = keyName.replace('m','').replace('°','');
  return NOTE_FREQ[base] || 261.63;
}

// ── State ─────────────────────────────────────────────────────────────

let selectedKey = null;    // { ring: 'major'|'minor'|'dim', index: 0-11 }
let hoveredKey = null;
let soundEnabled = true;
let showSignatures = false;
let showChords = false;
let animProgress = {};     // animation state per segment
let canvasSize = 0;

// ── Audio ─────────────────────────────────────────────────────────────

let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playChord(keyName, isMinor, isDim) {
  if (!soundEnabled) return;
  ensureAudio();
  const root = getFreq(keyName);
  const third = isMinor || isDim ? root * Math.pow(2, 3/12) : root * Math.pow(2, 4/12);
//   const fifth = root * Math.pow(2, 7/12);
  const fifth = isDim ? root * Math.pow(2, 6/12) : root * Math.pow(2, 7/12);
  const now = audioCtx.currentTime;

  [root, third, fifth].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.Q.setValueAtTime(1, now);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.12, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now + i * 0.04);
    osc.stop(now + 2);
  });
}

// ── Canvas Setup ──────────────────────────────────────────────────────

const canvas = document.getElementById('circle');
const ctx = canvas.getContext('2d');

function resize() {
  const wrapper = canvas.parentElement;
  const rect = wrapper.getBoundingClientRect();
  canvasSize = Math.min(rect.width, rect.height);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvasSize * dpr;
  canvas.height = canvasSize * dpr;
  canvas.style.width = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

window.addEventListener('resize', () => { resize(); draw(); });
resize();

// ── Geometry ──────────────────────────────────────────────────────────

const SLICE = (2 * Math.PI) / 12;
const START_ANGLE = -Math.PI / 2 - SLICE / 2; // C at top center

function getRingRadii() {
  const r = canvasSize / 2;
  return {
    outer: { inner: r * 0.58, outer: r * 0.92 },
    middle: { inner: r * 0.36, outer: r * 0.58 },
    inner: { inner: r * 0.18, outer: r * 0.36 },
    center: r * 0.18,
  };
}

function getSegmentPath(innerR, outerR, index) {
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const a1 = START_ANGLE + index * SLICE;
  const a2 = a1 + SLICE;
  return { cx, cy, innerR, outerR, a1, a2 };
}

function pointInSegment(x, y, innerR, outerR, index) {
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const dx = x - cx, dy = y - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < innerR || dist > outerR) return false;
  let angle = Math.atan2(dy, dx);
  let a1 = START_ANGLE + index * SLICE;
  // Normalize
  const norm = a => ((a % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  angle = norm(angle);
  a1 = norm(a1);
  let a2 = norm(a1 + SLICE);
  if (a1 < a2) return angle >= a1 && angle < a2;
  return angle >= a1 || angle < a2;
}

// ── Highlight Logic ──────────────────────────────────────────────────

function getHighlights() {
  if (!selectedKey) return {};
  const { ring, index } = selectedKey;
  const highlights = {};
  const key = (r, i) => `${r}-${i}`;

  highlights[key(ring, index)] = 'root';

  if (ring === 'major') {
    // Dominant = clockwise 1 step
    highlights[key('major', (index + 1) % 12)] = 'dominant';
    // Subdominant = counter-clockwise 1 step
    highlights[key('major', (index + 11) % 12)] = 'subdominant';
    // Relative minor = same index
    highlights[key('minor', index)] = 'relative';
  } else if (ring === 'minor') {
    highlights[key('minor', (index + 1) % 12)] = 'dominant';
    highlights[key('minor', (index + 11) % 12)] = 'subdominant';
    highlights[key('major', index)] = 'relative';
  } else if (ring === 'dim') {
    highlights[key('major', index)] = 'relative';
    highlights[key('minor', index)] = 'relative';
  }

  return highlights;
}

// ── Drawing ──────────────────────────────────────────────────────────

const COLORS = {
  root: '#d4a054',
  dominant: '#6a9fcc',
  subdominant: '#cc6a8a',
  relative: '#7acc6a',
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function lerpColor(a, b, t) {
  const parse = c => [parseInt(c.slice(1,3),16), parseInt(c.slice(3,5),16), parseInt(c.slice(5,7),16)];
  const ca = parse(a), cb = parse(b);
  const r = Math.round(ca[0] + (cb[0]-ca[0])*t);
  const g = Math.round(ca[1] + (cb[1]-ca[1])*t);
  const bl = Math.round(ca[2] + (cb[2]-ca[2])*t);
  return `rgb(${r},${g},${bl})`;
}

function drawSegment(innerR, outerR, index, fillColor, strokeColor, label, labelSize, isHovered, highlightType) {
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const a1 = START_ANGLE + index * SLICE;
  const a2 = a1 + SLICE;
  const midAngle = a1 + SLICE / 2;
  const midR = (innerR + outerR) / 2;

  // Animated highlight
  const key = `${highlightType ? 'h' : 'n'}-${index}-${innerR.toFixed(0)}`;
  if (!animProgress[key]) animProgress[key] = 0;
  const target = (highlightType || isHovered) ? 1 : 0;
  animProgress[key] += (target - animProgress[key]) * 0.15;
  const t = animProgress[key];

  // Fill
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, a1, a2);
  ctx.arc(cx, cy, innerR, a2, a1, true);
  ctx.closePath();

  let fill = fillColor;
  if (highlightType) {
    fill = lerpColor(fillColor, COLORS[highlightType], t * 0.3);
  }
  if (isHovered && !highlightType) {
    fill = lerpColor(fillColor, '#3a3a50', 0.5);
  }

  ctx.fillStyle = fill;
  ctx.fill();

  // Stroke
  ctx.strokeStyle = highlightType ? hexToRgba(COLORS[highlightType], 0.4 + t * 0.4) : strokeColor;
  ctx.lineWidth = highlightType ? 1.5 : 0.5;
  ctx.stroke();

  // Glow for highlighted
  if (highlightType && t > 0.1) {
    ctx.save();
    ctx.shadowColor = COLORS[highlightType];
    ctx.shadowBlur = 15 * t;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, a1, a2);
    ctx.arc(cx, cy, innerR, a2, a1, true);
    ctx.closePath();
    ctx.strokeStyle = hexToRgba(COLORS[highlightType], 0.3 * t);
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // Label
  const lx = cx + midR * Math.cos(midAngle);
  const ly = cy + midR * Math.sin(midAngle);

  ctx.save();
  ctx.translate(lx, ly);

  let textColor = '#c8c6c0';
  if (highlightType === 'root') textColor = COLORS.root;
  else if (highlightType) textColor = COLORS[highlightType];
  else if (isHovered) textColor = '#ffffff';

  ctx.fillStyle = textColor;
  ctx.font = `${isHovered || highlightType === 'root' ? '600' : '400'} ${labelSize}px 'Outfit', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvasSize, canvasSize);
  const rings = getRingRadii();
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const highlights = getHighlights();

  // Background glow
  if (selectedKey) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, canvasSize/2);
    const col = COLORS[highlights[`${selectedKey.ring}-${selectedKey.index}`]] || COLORS.root;
    grad.addColorStop(0, hexToRgba(col, 0.05));
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvasSize, canvasSize);
  }

  const outerLabelSize = Math.max(11, canvasSize * 0.028);
  const midLabelSize = Math.max(9, canvasSize * 0.022);
  const innerLabelSize = Math.max(7, canvasSize * 0.017);

  // Draw rings back to front
  for (let i = 0; i < 12; i++) {
    const hInner = highlights[`dim-${i}`];
    const isHovInner = hoveredKey && hoveredKey.ring === 'dim' && hoveredKey.index === i;
    drawSegment(rings.inner.inner, rings.inner.outer, i, '#111118', '#1e1e2a', showChords ? DIMINISHED[i] : DIMINISHED[i], innerLabelSize, isHovInner, hInner);
  }
  for (let i = 0; i < 12; i++) {
    const hMid = highlights[`minor-${i}`];
    const isHovMid = hoveredKey && hoveredKey.ring === 'minor' && hoveredKey.index === i;
    drawSegment(rings.middle.inner, rings.middle.outer, i, '#15152a', '#222238', MINOR_KEYS[i], midLabelSize, isHovMid, hMid);
  }
  for (let i = 0; i < 12; i++) {
    const hOuter = highlights[`major-${i}`];
    const isHovOuter = hoveredKey && hoveredKey.ring === 'major' && hoveredKey.index === i;
    drawSegment(rings.outer.inner, rings.outer.outer, i, '#1a1a32', '#2a2a42', MAJOR_KEYS[i], outerLabelSize, isHovOuter, hOuter);
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, rings.center, 0, Math.PI * 2);
  ctx.fillStyle = '#0c0c14';
  ctx.strokeStyle = '#1e1e2a';
  ctx.lineWidth = 0.5;
  ctx.fill();
  ctx.stroke();

  // Center text
  if (selectedKey && showSignatures) {
    const keyName = selectedKey.ring === 'major' ? MAJOR_KEYS[selectedKey.index]
      : selectedKey.ring === 'minor' ? MINOR_KEYS[selectedKey.index]
      : DIMINISHED[selectedKey.index];
    const sig = KEY_SIGNATURES[keyName];
    if (sig) {
      const parts = sig.split(':');
      ctx.fillStyle = var_accent();
      ctx.font = `500 ${Math.max(8, canvasSize * 0.018)}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (parts.length === 1) {
        ctx.fillText(parts[0], cx, cy);
      } else {
        ctx.fillText(parts[0].trim(), cx, cy - canvasSize * 0.02);
        ctx.fillStyle = '#c8c6c0';
        ctx.font = `300 ${Math.max(7, canvasSize * 0.014)}px 'JetBrains Mono', monospace`;
        ctx.fillText(parts[1].trim(), cx, cy + canvasSize * 0.02);
      }
    }
  } else if (!selectedKey) {
    ctx.fillStyle = '#4a4a5a';
    ctx.font = `300 ${Math.max(8, canvasSize * 0.016)}px 'Outfit', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('♩', cx, cy);
  }

  // Ring labels (outer edge)
  const labelR = rings.outer.outer + canvasSize * 0.01;
  ctx.fillStyle = '#3a3a4a';
  ctx.font = `300 ${Math.max(6, canvasSize * 0.012)}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
}

function var_accent() { return '#d4a054'; }

// ── Interaction ──────────────────────────────────────────────────────

function getKeyAt(x, y) {
  const rings = getRingRadii();
  for (let i = 0; i < 12; i++) {
    if (pointInSegment(x, y, rings.outer.inner, rings.outer.outer, i))
      return { ring: 'major', index: i };
    if (pointInSegment(x, y, rings.middle.inner, rings.middle.outer, i))
      return { ring: 'minor', index: i };
    if (pointInSegment(x, y, rings.inner.inner, rings.inner.outer, i))
      return { ring: 'dim', index: i };
  }
  return null;
}

function updateInfoPanel() {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('info-key-name');
  const sigEl = document.getElementById('info-signature');
  const relEl = document.getElementById('info-relations');
  const emptyEl = document.getElementById('empty-state');

  if (!selectedKey) {
    panel.classList.remove('active');
    nameEl.classList.remove('visible');
    sigEl.classList.remove('visible');
    relEl.classList.remove('visible');
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';
  panel.classList.add('active');

  const { ring, index } = selectedKey;
  let keyName, ringLabel;
  if (ring === 'major') { keyName = MAJOR_KEYS[index]; ringLabel = 'Major'; }
  else if (ring === 'minor') { keyName = MINOR_KEYS[index]; ringLabel = 'Minor'; }
  else { keyName = DIMINISHED[index]; ringLabel = 'Diminished'; }

  nameEl.textContent = `${keyName} ${ringLabel}`;
  nameEl.classList.add('visible');

  const sig = KEY_SIGNATURES[keyName];
  sigEl.textContent = sig || '';
  sigEl.classList.add('visible');

  // Build relations
  relEl.innerHTML = '';
  const highlights = getHighlights();
  const labelMap = { root: 'Root', dominant: 'Dominant', subdominant: 'Subdominant', relative: 'Relative' };
  const keyNames = { major: MAJOR_KEYS, minor: MINOR_KEYS, dim: DIMINISHED };

  for (const [k, type] of Object.entries(highlights)) {
    if (type === 'root') continue;
    const [r, idx] = k.split('-');
    const name = keyNames[r]?.[parseInt(idx)];
    if (!name) continue;
    const tag = document.createElement('span');
    tag.className = `relation-tag ${type}`;
    tag.textContent = `${labelMap[type]}: ${name}`;
    relEl.appendChild(tag);
  }
  relEl.classList.add('visible');
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * canvasSize;
  const y = (e.clientY - rect.top) / rect.height * canvasSize;
  const key = getKeyAt(x, y);
  hoveredKey = key;
  canvas.style.cursor = key ? 'pointer' : 'default';
});

canvas.addEventListener('mouseleave', () => { hoveredKey = null; });

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * canvasSize;
  const y = (e.clientY - rect.top) / rect.height * canvasSize;
  const key = getKeyAt(x, y);

  if (key) {
    if (selectedKey && selectedKey.ring === key.ring && selectedKey.index === key.index) {
      selectedKey = null;
    } else {
      selectedKey = key;
      const isMinor = key.ring === 'minor';
      const isDim = key.ring === 'dim';
      const keyName = key.ring === 'major' ? MAJOR_KEYS[key.index]
        : key.ring === 'minor' ? MINOR_KEYS[key.index]
        : DIMINISHED[key.index];
      playChord(keyName, isMinor, isDim);
    }
    updateInfoPanel();
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width * canvasSize;
  const y = (touch.clientY - rect.top) / rect.height * canvasSize;
  const key = getKeyAt(x, y);

  if (key) {
    if (selectedKey && selectedKey.ring === key.ring && selectedKey.index === key.index) {
      selectedKey = null;
    } else {
      selectedKey = key;
      const isMinor = key.ring === 'minor';
      const isDim = key.ring === 'dim';
      const keyName = key.ring === 'major' ? MAJOR_KEYS[key.index]
        : key.ring === 'minor' ? MINOR_KEYS[key.index]
        : DIMINISHED[key.index];
      playChord(keyName, isMinor, isDim);
    }
    updateInfoPanel();
  }
}, { passive: false });

// ── Controls ─────────────────────────────────────────────────────────

document.getElementById('btn-sound').addEventListener('click', function() {
  soundEnabled = !soundEnabled;
  this.classList.toggle('active', soundEnabled);
});

document.getElementById('btn-signatures').addEventListener('click', function() {
  showSignatures = !showSignatures;
  this.classList.toggle('active', showSignatures);
});

document.getElementById('btn-chords').addEventListener('click', function() {
  showChords = !showChords;
  this.classList.toggle('active', showChords);
});

// ── Animation Loop ───────────────────────────────────────────────────

function animate() {
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>
