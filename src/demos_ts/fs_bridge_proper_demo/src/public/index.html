<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>OPFS Bridge – Proper Demo</title>
  <link rel="icon" href="data:,">
</head>

<body>
  <button id="write">Write OPFS</button>
  <button id="push">Push to Disk</button>
  <button id="pull">Pull to OPFS</button>

  <script type="module">
    import {debugPersist} from "./browser.js";
    import { DefaultOpfsBridge } from "./opfsBridge.js";

    const bridge = new DefaultOpfsBridge(true);
    const path = "ideas/session-001/hello.txt";

    write.onclick = async () => {
      await bridge.write(
        path,
        "Hello from OPFS\n" + new Date().toISOString()
      );
    };

    push.onclick = async () => {
      await bridge.push(path);
    };

    pull.onclick = async () => {
      await bridge.pull(path);
    };


    window.addEventListener("DOMContentLoaded", () => {
      debugPersist();
      console.log("helllo");
    });

  </script>
</body>

</html>
