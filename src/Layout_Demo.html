## Global / Transport Controls

*   **Play**  
    Starts playback from the current playhead position.

    Arms recording and starts playback, writing audio from the current playhead position.

*   **Play + Record**  
    Convenience control that starts playback and recording together.

*   **Timer Display**  
    Shows the current playhead time in minutes, seconds, and tenths.

*   **Meter**  
    Displays input level during recording.

## Global Musical Context

*   **Tempo (BPM)**  
    Displays and edits the global tempo; stored as state only (no playback wiring yet).

*   **Time Signature Dropdown**

## Zoom & Navigation

*   **Zoom Slider**  
    Scales the timeline horizontally around the current view center.

## Timeline & Ruler

*   **Timeline Ruler**  
    Displays time (and bars/beats later) and serves as the primary interaction surface for markers and scrubbing.

*   **Timeline Overlay**  
    Transparent interaction layer for playhead scrubbing and click‑to‑seek.

*   **Playhead**  
    Indicates the current playback position; moves continuously during playback or interactively during scrubbing.

## Scrubbing Interaction

*   **Timeline Click (Idle)**  
    Moves the playhead to the clicked position without starting playback.

*   **Timeline Drag (Scrub)**  
    Temporarily pauses playback and repositions the playhead in real time while dragging.

*   **Scrub Release**  
    Restores the previous transport state (play or idle) without resetting the playhead.

***

## Markers (Global)

*   **Create Marker**  
    Click the timeline ruler to create a marker at that time.

*   **Marker (Ruler)**  
    Vertical time reference that can be selected and dragged to a new position.

*   **Marker Selection**  
    Clicking a marker selects it and loads it into the marker transport.

***

## Marker Transport Controls

*   **First Marker**  
    Selects the first marker and jumps the playhead to it.

*   **Previous Marker**  
    Selects the previous marker and jumps the playhead to it.

*   **Next Marker**  
    Selects the next marker and jumps the playhead to it.

*   **Last Marker**  
    Selects the last marker and jumps the playhead to it.

*   **Marker Time Display**  
    Shows the time of the currently selected marker.

*   **Delete Marker**

*   **Track Name**  
    Editable label identifying the track.

*   **Solo (S)**

# JavaScript Organization Scheme

### 1. **State Layer (Truth)**

This is where **what is true** lives.

Characteristics:

*   Plain variables or plain objects
*   Semantic units only
*   No DOM access
*   No rendering
*   No side effects

Examples from your app:

*   `currentTimeSeconds`
*   `markers[]`
*   `selectedMarkerId`
*   `tempoBPM`
*   `timeSignature`
*   `zoom`
*   transport flags (`playing`, `recording`)
*   scrub flags (`isScrubbing`, `scrubPrevTransportState`)

**Rule**

> State never knows how it is rendered.

***

### 2. **Projection / Rendering Layer (View)**

This layer answers **“given the current state, what should the UI look like?”**

Characteristics:

*   Reads state
*   Writes DOM
*   Idempotent
*   Safe to call at any time
*   No state mutation

Examples:

*   `renderTimelineRuler()`
*   `renderMarkers()`
*   `renderMarkerTransport()`
*   `renderTimelineLayer()`
*   `setPlayheadPositionPx()`

**Rule**

> Rendering functions must not change state — ever.

This is why zoom, scrubbing, and marker fixes kept working once state was right.

***

### 3. **Controller / Authority Functions (Decisions)**

This layer answers **“what does this action mean?”**

Characteristics:

*   Mutates state
*   Calls render functions
*   Centralized
*   One authority per concept

Examples:

*   `applyTransportChange()`
*   `onTransportStart()`
*   `selectMarkerByIndex()`
*   marker deletion logic
*   zoom handler logic (state updates only)

**Rule**

> If a behavior matters, it must have exactly one authoritative function.

This is why:

*   marker selection works
*   deletion doesn’t move the playhead
*   scrubbing restores state correctly

***

### 4. **Event Handlers (Intent)**

This layer answers **“the user did something”**, nothing more.

Characteristics:

*   Very small
*   No logic
*   No math
*   No rendering
*   No state inspection beyond trivial guards

Examples:

*   button `onclick`
*   slider `oninput`
*   `mousedown` / `mousemove` / `mouseup`
*   marker click listeners

Typical handler shape:

```js
button.onclick = () => {
  someAuthoritativeFunction();
};
```

**Rule**

> Event handlers do not decide. They delegate.

***

### 5. **Temporary Interaction Overrides (Modes)**

These are **not states of the app**, but short‑lived behaviors.

Examples:

*   scrubbing
*   marker dragging
*   future: loop range drag, selection drag

Characteristics:

*   Snapshot state
*   Override behavior
*   Restore state exactly
*   Never stored in transport state

**Rule**

> Temporary interaction ≠ application state.

This distinction prevented your scrubbing logic from exploding the transport state machine.

***

## How Data Flows (The Mental Model)

**One‑way truth, two‑way interaction**

    User Input
       ↓
    Event Handler (intent only)
       ↓
    Authority Function (mutates state)
       ↓
    Render Functions (project state)

Nothing skips a layer.

***

## Why This Scheme Worked for You

This organization is why you were able to fix:

*   playhead resets
*   zoom/playhead desync
*   scrubbing restore bugs
*   marker navigation edge cases
*   deletion side effects

…without rewriting everything.

Each bug lived in **exactly one layer**, so each fix did too.

***

## Litmus Test (Use This When Adding Code)

Ask yourself:

1.  Is this answering **what is true**? → State
2.  Is this answering **what it should look like**? → Render
3.  Is this answering **what an action means**? → Authority
4.  Is this just **reacting to an event**? → Handler
5.  Is this **temporary and reversible**? → Interaction override

If a function mixes answers, it’s in the wrong place.

***

## One‑Sentence Summary

> **State defines truth.  
> Authorities define meaning.  
> Rendering defines appearance.  
> Event handlers just connect them.**

That is the organization scheme you’re already following — now it’s explicit.

    <script>
        //  Constants -----
        const BASE_PPS = 100;
        const SCROLL_THRESHOLD = 120;


        //  DOM References -----
        const controlsCol = document.getElementById("controls-column");
        const controlsScrollCol = document.getElementById("controls-scroll-column");
        const timelineCol = document.getElementById("timeline-column");
        const timelineArea = document.getElementById("timeline-area");
        const timelineInner = document.getElementById("timeline-inner");
        const timelineColumn = document.getElementById("timeline-column");
        const timelineOverlay = document.getElementById("timeline-overlay");
        const timelineRuler = document.getElementById("timeline-ruler");
        const zoomSlider = document.getElementById("zoom-slider");

        // templates
        const controlTpl = document.getElementById("control-row-template");
        const timelineTpl = document.getElementById("timeline-row-template");

        // transport
        const playBtn = document.getElementById("playBtn");
        const playRecordBtn = document.getElementById("playRecordBtn");
        const recordBtn = document.getElementById("recordBtn");
        const playhead = document.getElementById("playhead");
        const timer = document.getElementById("timer");
        const meter = document.getElementById("meter");
        const meterBar = document.getElementById("meterBar");
        const recordRange =
            document.getElementById("record-range");
        const transportToggles =
            document.querySelectorAll("#transport-scenes .transport-scene");

        // debug
        const debugTransportState = document.getElementById("debug-transport-state");


        //  Zoom State -----
        const zoomLevels = [0.25, 0.5, 1, 2, 4];
        let zoomIndex = 2;           // default = 1x
        let zoom = zoomLevels[zoomIndex];


        // Timeline Ruler
        const rulerCanvas = document.getElementById("timeline-ruler-canvas");
        const rulerCtx = rulerCanvas.getContext("2d");
        // const markerDeleteBtn = document.getElementById("marker-delete");


        // ----- Marker Transport Controls -----
        const markerFirstBtn = document.getElementById("marker-first");
        const markerPrevBtn = document.getElementById("marker-prev");
        const markerNextBtn = document.getElementById("marker-next");
        const markerLastBtn = document.getElementById("marker-last");
        const markerDeleteBtn = document.getElementById("marker-delete");



        function secondsToPixels(seconds) {
            return seconds * BASE_PPS * zoom;
        }

        function pixelsToSeconds(px) {
            return px / (BASE_PPS * zoom);
        }


        function renderTimelineLayer() {
            renderTimelineRuler();
            renderMarkers();
        }


        function renderTimelineRuler() {

            const style = getComputedStyle(document.body);

            const textMain =
                style.getPropertyValue("--text-main").trim();

            const textMuted =
                style.getPropertyValue("--text-muted").trim();

            const borderSubtle =
                style.getPropertyValue("--border-subtle").trim();

            const accentPrimary =
                style.getPropertyValue("--accent-Primary").trim();


            const contentWidth = timelineInner.scrollWidth;
            const viewWidth = timelineArea.clientWidth;

            const rulerHeight = 32;

            // Canvas sizing (authoritative)
            rulerCanvas.style.height = `${rulerHeight}px`;
            rulerCanvas.width = contentWidth;
            rulerCanvas.height = rulerHeight;

            const height = rulerCanvas.height;

            rulerCtx.clearRect(0, 0, contentWidth, height);

            const scrollLeft = timelineArea.scrollLeft;
            const startSeconds = pixelsToSeconds(scrollLeft);
            const endSeconds = pixelsToSeconds(scrollLeft + viewWidth);

            rulerCtx.font = "10px monospace";
            rulerCtx.fillStyle = textMuted;

            let ticks = [];

            // ==========================
            // TICK GENERATION
            // ==========================

            if (rulerMode === "seconds") {

                const majorStep =
                    zoom <= 0.5 ? 4 :
                        zoom <= 1 ? 2 :
                            zoom <= 2 ? 1 : 0.5;

                const minorStep = majorStep / 4;

                for (
                    let t = Math.floor(startSeconds / minorStep) * minorStep;
                    t <= endSeconds;
                    t += minorStep
                ) {
                    ticks.push({
                        time: t,
                        major: Math.abs(t % majorStep) < 0.0001,
                        label:
                            Math.abs(t % majorStep) < 0.0001
                                ? formatTime(t)
                                : null
                    });
                }

            } else if (rulerMode === "bars") {

                const barLen = secondsPerBar();
                const beatLen = secondsPerBeat();

                const firstBar =
                    Math.floor(startSeconds / barLen);

                let barTime = firstBar * barLen;

                while (barTime <= endSeconds) {

                    // Major bar tick
                    ticks.push({
                        time: barTime,
                        major: true,
                        label: `Bar ${firstBar + 1 + ((barTime - firstBar * barLen) / barLen)}`
                    });

                    // Beat ticks
                    for (let b = 1; b < beatsPerBar; b++) {
                        const bt = barTime + b * beatLen;
                        if (bt >= startSeconds && bt <= endSeconds) {
                            ticks.push({
                                time: bt,
                                major: false,
                                label: null
                            });
                        }
                    }

                    barTime += barLen;
                }
            }

            // ==========================
            // TICK RENDERING
            // ==========================

            for (const tick of ticks) {
                const x = secondsToPixels(tick.time);

                if (tick.major) {
                    rulerCtx.strokeStyle = textMain;
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, 8);
                    rulerCtx.stroke();

                    if (tick.label) {
                        rulerCtx.fillText(tick.label, x + 2, 10);
                    }
                } else {
                    rulerCtx.strokeStyle = borderSubtle;
                    rulerCtx.beginPath();
                    rulerCtx.moveTo(x + 0.5, height);
                    rulerCtx.lineTo(x + 0.5, height - 6);
                    rulerCtx.stroke();
                }
            }

            // ==========================
            // PLAYHEAD LINE
            // ==========================

            if (getTransportState() !== "IDLE") {
                const playheadX = getPlayheadX();

                rulerCtx.strokeStyle = accentPrimary;
                rulerCtx.lineWidth = 1;

                rulerCtx.beginPath();
                rulerCtx.moveTo(playheadX + 0.5, 0);
                rulerCtx.lineTo(playheadX + 0.5, height);
                rulerCtx.stroke();
            }
        }


        timelineArea.addEventListener("scroll", () => {
            renderTimelineLayer();
        });


        function renderMetronomeScan() {
            if (getTransportState() === "IDLE") return;

            const t = getPlayheadTime();        // seconds
            const spb = secondsPerBeat();       // already defined


            const spbar = secondsPerBar();
            const phase = (t / spbar) % 1; // bar mode


            // const phase = (t / spb) % 1;   // beat mode     // 0 → 1 per beat

            const scan = document.querySelector(".metronome-scan");
            const line = scan.querySelector(".metronome-line");

            const width = scan.clientWidth;
            const x = phase * width;

            // blink at beginning of phase
            if (phase < 0.03) {
                line.style.opacity = "1";
                line.style.width = "3px";
            } else {
                line.style.opacity = "0.7";
                line.style.width = "2px";
            }


            line.style.transform = `translateX(${x}px)`;
        }

        function getRulerTicks(startSeconds, endSeconds) {

        function getSecondTicks(startSeconds, endSeconds) {
            const majorStep =
                zoom <= 0.5 ? 4 :
                    zoom <= 1 ? 2 :
                        zoom <= 2 ? 1 : 0.5;

            const minorStep = majorStep / 4;
            const ticks = [];

            for (
                let t = Math.floor(startSeconds / minorStep) * minorStep;
                t <= endSeconds;
                t += minorStep
            ) {
                ticks.push({
                    time: t,
                    major: Math.abs(t % majorStep) < 0.0001,
                    label: Math.abs(t % majorStep) < 0.0001
                        ? formatTime(t)
                        : null
                });
            }

            return ticks;
        }


        function getBarTicks(startSeconds, endSeconds) {
            const barLength = secondsPerBar();
            const beatLength = secondsPerBeat();
            const ticks = [];

            const startBar =
                Math.floor(startSeconds / barLength);

            let t = startBar * barLength;

            while (t <= endSeconds) {
                // Major bar tick
                ticks.push({
                    time: t,
                    major: true,
                    label: `Bar ${startBar + 1}`
                });

                // Beat ticks
                for (let b = 1; b < beatsPerBar; b++) {
                    const bt = t + b * beatLength;
                    if (bt >= startSeconds && bt <= endSeconds) {
                        ticks.push({
                            time: bt,
                            major: false,
                            label: null
                        });
                    }
                }

                t += barLength;
            }

            return ticks;
        }

        //     zoom = zoomLevels[zoomIndex];

        //     rerenderWaveforms();
        //     syncTimelineOverlay();
        //     renderTimelineLayer();
        //     timelineArea.scrollLeft = centerTime * BASE_PPS * zoom;
        // };

        zoomSlider.oninput = () => {
            // ----- Preserve Center Time -----
            const centerTime =
                timelineArea.scrollLeft / (BASE_PPS * zoom);

            // ----- Update Zoom -----
            zoomIndex = parseInt(zoomSlider.value, 10);
            zoom = zoomLevels[zoomIndex];

            // ----- Re-render Timeline -----
            rerenderWaveforms();
            syncTimelineOverlay();
            renderTimelineLayer();

            // ----- Restore Center Scroll -----
            timelineArea.scrollLeft =
                centerTime * BASE_PPS * zoom;

            // ----- Re-project Playhead if Transport is Idle -----
            if (getTransportState() === "IDLE") {
                const px = secondsToPixels(currentTimeSeconds);
                setPlayheadPositionPx(px);
            }
            ensurePlayheadInViewCentered();
        };

        // ----- Playhead View Helpers -----
        function ensurePlayheadInViewCentered() {
            const playheadX = secondsToPixels(currentTimeSeconds);
            const viewLeft = timelineArea.scrollLeft;
            const viewRight = viewLeft + timelineArea.clientWidth;

            // // Offscreen to the left OR right → center it
            // if (playheadX < viewLeft || playheadX > viewRight) {
            //     timelineArea.scrollLeft =
            //         Math.max(0, playheadX - timelineArea.clientWidth / 2);
            // }


            const MARGIN = 40;
            if (
                playheadX < viewLeft + MARGIN ||
                playheadX > viewRight - MARGIN
            ) {
                timelineArea.scrollLeft =
                    Math.max(0, playheadX - timelineArea.clientWidth / 2);
            }

        }



        //  Transport Button Handlers -----
        /**
         * This is the only place where transport state changes. 
         * Keep them boring and small.
         * This is where future complexity will live — now it’s clearly contained.
         **/


        let recordStartTime = null; //? is that ok?

        function startRecordingRange() {
            recordStartTime = getPlayheadTime(); // seconds
            recordRange.style.display = "block";
            recordRange.style.width = "0px";
        }


        function getPlayheadTime() {
            const x = getPlayheadX();
            return pixelsToSeconds(x);
        }


        function updateRecordRange() {
            if (recordStartTime === null) return;

            const currentTime = getPlayheadTime();

            const startX = secondsToPixels(recordStartTime);
            const endX = secondsToPixels(currentTime);

            recordRange.style.left = `${startX}px`;
            recordRange.style.width = `${Math.max(0, endX - startX)}px`;
        }


        function clearRecordingRange() {
            recordRange.style.display = "none";
            recordStartX = null;
        }

        //  -----------Apply Transport Change ----
        function applyTransportChange({ play, record }) {
            const prevState = getTransportState();
            const wasRecording = recording;

            playing = play;
            recording = record;

            const nextState = getTransportState();

            if (prevState === "IDLE" && nextState !== "IDLE") {
                onTransportStart();
            }

            if (prevState !== "IDLE" && nextState === "IDLE") {
                // if (!isScrubbing) {
                //     resetPlayhead();
                // }
            }

            if (!wasRecording && recording) startRecordingRange();
            if (wasRecording && !recording) clearRecordingRange();

            syncTransportUI();
        }


        playBtn.onclick = () =>
            applyTransportChange({ play: !playing, record: recording });

        recordBtn.onclick = () =>
            applyTransportChange({ play: playing, record: !recording });

        playRecordBtn.onclick = () =>
            applyTransportChange({
                play: getTransportState() !== "PLAY_RECORD",
                record: getTransportState() !== "PLAY_RECORD"
            });


        // ----- Scrub Handlers -----
        timelineArea.addEventListener("mousedown", (e) => {
            if (recording) return;

            isScrubbing = true;
            scrubPrevTransportState = getTransportState();

            if (scrubPrevTransportState !== "IDLE") {
                applyTransportChange({ play: false, record: false });
            }

            scrubToMouseEvent(e);
        });


        document.addEventListener("mousemove", (e) => {
            if (!isScrubbing) return;
            scrubToMouseEvent(e);
        });


        document.addEventListener("mouseup", () => {
            if (!isScrubbing) return;

            isScrubbing = false;

            if (scrubPrevTransportState === "PLAY") {
                applyTransportChange({ play: true, record: false });
            }

            scrubPrevTransportState = null;
        });




        //  One‑time Initialization -----
        setupSoloBtns();
        updateMeter();
        syncTimelineOverlayWidth();
        syncTimelineOverlay();
        renderTimelineLayer();
        renderTempo();
        renderTimeSignature();


        //  End of Script -----


    </script>

</body>
