<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:,">
    <title>fs_bridge_demo</title>
    <style>
        button {
            margin-right: 8px;
            margin-bottom: 8px;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 10px;
            max-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>OPFS → fs bridge demo</h1>

    <button id="writeOpfs">Write OPFS File</button>
    <button id="sendOpfs">Send to Backend</button>
    <button id="loadFromBackend">Load from Backend</button>
    <button id="dumpOpfs">Dump OPFS Contents</button>
    <button id="deleteOpfs">Delete OPFS Contents</button>

    <pre id="output">(OPFS dump will appear here)</pre>

    <!-- Browser logic -->
    <script type="module" src="/browser.js"></script>

    <script type="module">

        const MAX_TEXT_PREVIEW_BYTES = 4096; // 4 KB
        const MAX_BINARY_PREVIEW_BYTES = 128;


        function log(value) {
            if (typeof value !== "string") {
                throw new Error("log() received non-string value");
            }
            output.textContent += value + "\n";
        }


        function looksLikeText(bytes) {
            const decoder = new TextDecoder("utf-8", { fatal: false });
            const text = decoder.decode(bytes);
            return !text.includes("\uFFFD");
        }


        async function dumpDirectory(dir, indent = "") {
            for await (const entry of dir.values()) {
                if (entry.kind === "directory") {
                    log(`${indent}📁 ${entry.name}/`);
                    await dumpDirectory(entry, indent + "  ");
                    continue;
                }

                const file = await entry.getFile();

                log(
                    `${indent}📄 ${entry.name} (${file.size} bytes, modified ${new Date(
                        file.lastModified
                    ).toISOString()})`
                );

                try {
                    const text = await file.text(); // ✅ safest way
                    log(`${indent}  ── contents (text) ──`);
                    log(
                        text.length > 1000
                            ? `${text.slice(0, 1000)}\n${indent}  … (truncated)`
                            : text
                    );
                } catch {
                    // Fallback for binary
                    const buffer = await file.arrayBuffer();
                    const bytes = new Uint8Array(buffer.slice(0, 128));
                    const hex = Array.from(bytes, b =>
                        b.toString(16).padStart(2, "0")
                    ).join(" ");

                    log(`${indent}  ── contents (binary preview) ──`);
                    log(`${indent}  ${hex}`);
                    if (file.size > 128) {
                        log(`${indent}  … (${file.size} bytes total)`);
                    }
                }
            }
        }

        const output = document.getElementById("output");

        async function deleteDirectory(dir) {
            for await (const entry of dir.values()) {
                if (entry.kind === "file") {
                    // Delete file
                    await dir.removeEntry(entry.name);
                } else if (entry.kind === "directory") {
                    // Recursively delete directory contents
                    await deleteDirectory(entry);
                    // Then delete the empty directory itself
                    await dir.removeEntry(entry.name);
                }
            }
        }



        document
            .getElementById("dumpOpfs")
            .addEventListener("click", async () => {
                output.textContent = "";
                const root = await navigator.storage.getDirectory();
                log("OPFS contents:");
                await dumpDirectory(root);
            });

        document
            .getElementById("deleteOpfs")
            .addEventListener("click", async () => {

                const confirmed = confirm(
                    "Delete ALL contents of OPFS? This cannot be undone."
                );
                if (!confirmed) return;

                const root = await navigator.storage.getDirectory();
                await deleteDirectory(root);

                alert("OPFS contents deleted");

            });
    </script>
</body>

</html>
