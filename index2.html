<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Browser DAW Recorder</title>

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* Top transport bar */
  .transport {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
  }

  .transport button {
    padding: 0.6rem 1.2rem;
    font-size: 1rem;
    background: #ff7a00;
    border: none;
    border-radius: 6px;
    color: black;
    cursor: pointer;
    font-weight: bold;
  }

  .transport button:active {
    transform: scale(0.97);
  }

  .transport .stop-btn {
    background: #ff3b30;
  }

  .timer {
    font-size: 1.2rem;
    font-weight: bold;
    color: #0f0;
    margin-left: auto;
  }

  /* Tracks container */
  .tracks {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
  }

  /* Individual track */
  .track {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }

  .track-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .track-title {
    font-weight: bold;
  }

  .track-delete {
    background: #ff3b30;
    border: none;
    border-radius: 4px;
    color: white;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
  }

  /* Waveform placeholder */
  .waveform {
    height: 80px;
    background: #333;
    border-radius: 6px;
    margin: 1rem 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #777;
    font-size: 0.9rem;
    font-style: italic;
  }

  /* Gain control */
  .gain-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .gain-control input[type="range"] {
    width: 200px;
  }

  /* Add new track button */
  .add-track {
    width: 100%;
    padding: 1rem 0;
    border: 2px dashed #555;
    border-radius: 8px;
    color: #aaa;
    text-align: center;
    font-size: 1.1rem;
    cursor: pointer;
    margin-top: 1rem;
  }

  .add-track:hover {
    background: #222;
    border-color: #777;
    color: #ddd;
  }

  /* Track arming state */
  .track.record-armed {
    border-color: #ff7a00;
    box-shadow: 0 0 8px #ff7a00aa;
  }
  .track.record-armed .waveform {
    color: #ff7a00;
    background: #2a1a00;
  }
</style>
</head>

<body>

<!-- Transport bar -->
<div class="transport">
  <button class="record-btn">● Record</button>
  <button class="stop-btn">■ Stop</button>
  <div class="timer">00:00.00</div>
</div>

<!-- Tracks list -->
<div class="tracks">

  <!-- Example of a track after recording -->
  <div class="track">
    <div class="track-header">
      <div class="track-title">Track 1</div>
      <button class="track-delete">Delete</button>
    </div>

    <div class="waveform">[ waveform will be drawn here ]</div>

    <div class="gain-control">
      Gain:
      <input type="range" min="0" max="2" step="0.01" value="1" />
    </div>
  </div>

  <!-- Empty track "armed" ready to record -->
  <div class="track record-armed">
    <div class="track-header">
      <div class="track-title">New Track</div>
    </div>
    <div class="waveform">Ready to Record…</div>
  </div>

  <!-- Add track button -->
  <div class="add-track">+ Add Track</div>
</div>

</body>
</html>
