<!DOCTYPE html>
<html>

<head>

    <link rel="icon" type="image/png" sizes="16x16" href="./media/images/color_favicon/favicon_16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./media/images/color_favicon/favicon_32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="./media/images/color_favicon/favicon_48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="./media/images/color_favicon/favicon_64.png">
    <link rel="icon" type="image/png" sizes="128x128" href="./media/images/fcolor_favicon/avicon_128.png">
    <link rel="icon" type="image/png" sizes="180x180" href="./media/images/color_favicon/favicon_180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./media/images/color_favicon/favicon_192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="./media/images/color_favicon/favicon_256.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./media/images/color_favicon/favicon_512.png">

    <link rel="apple-touch-icon" sizes="180x180" href="./media/images/color_favicon/favicon_180.png">

    <link rel="icon" type="image/x-icon" href="./media/images/color_favicon/favicon.ico">

    <link rel="stylesheet" href="styles.css">

    <script type="importmap">
    {
        "imports": {
            "idb": "https://cdn.jsdelivr.net/npm/idb/build/esm/index.js"
        }
    }
    </script>


</head>

<body>
    <!-- <button id="start">Start Recording</button>
    <button id="stop">Stop Recording</button> -->
    <!-- <h3>Recordings</h3>
    <div id="list"></div> -->


    <!-- Transport bar -->
    <div class="transport">
        <button id="g-record-btn" class="record-btn">● Record</button>
        <button id="g-stop-btn" class="stop-btn">■ Stop</button>
        <button id="g-play-btn" class="play-btn">▶ Play</button>
        <div class="timer">00:00.00</div>
    </div>

    <!-- Templates -->
    <template id="track-template">
        <div class="track">
            <div class="track-header">
                <button class="track-play">▶</button>
                <div class="track-title">Track 1</div>
                <button class="track-delete">Delete</button>
            </div>

            <div class="waveform">[ waveform will be drawn here ]</div>

            <div class="gain-control">
                Gain:
                <input type="range" min="0" max="2" step="0.01" value="1" />
            </div>
        </div>
    </template>

    <!-- Tracks list -->
    <div id="tracks" class="tracks">

        <!-- Empty track "armed" ready to record -->
        <div class="track record-armed">
            <div class="track-header">
                <div class="track-title">New Track</div>
            </div>
            <div class="waveform">Ready to Record…</div>
        </div>

        <!-- Add track button -->
        <div class="add-track">+ Add Track</div>
    </div>

    <script type="module" src="./dist/app.js"></script>
</body>

</html>
