<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Layout Demo</title>

    <style>
        /* Structural CSS */
        :root {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;

            --text-main: #eee;
            --text-muted: #aaa;

            --accent-primary: #ff9500;
            --accent-danger: #ff3b30;
            --accent-highlight: #ffd400;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;

            --border-subtle: #333;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;


            background: var(--bg-app);
            color: var(--text-main);

        }

        /* Transport */

        .transport {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            /* background: #1a1a1a;
            border-bottom: 1px solid #333; */

            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);

        }

        .transport button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .transport button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .record-btn.recording {
            background: #ff3b30;
            color: black;
        }

        /* Timer */

        .timer {
            font-variant-numeric: tabular-nums;
            min-width: 80px;
        }

        /* Meter */

        .meter {
            width: 120px;
            height: 10px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .meter.active {
            display: block;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4cd964, #ffd400, #ff3b30);
            transition: width 0.1s linear;
        }

        /* Layout */

        .layout-root {
            flex: 1;
            display: grid;
            grid-template-columns: 220px 1fr;
            overflow: hidden;
        }

        /* Controls column */

        #controls-column {
            background: var(--bg-app);
            overflow-y: hidden;
            overflow-x: hidden;
        }

        .control-row {
            padding: 0px;
            box-sizing: border-box;
        }

        /* Track name */

        .track-title {
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-title:hover {
            background: var(--bg-panel);
        }

        .track-title:focus {
            outline: 1px solid #ff9500;
            background: var(--bg-surface);
        }

        /* Track controls */

        /* #controls-column::-webkit-scrollbar {
            display: none;
        } */


        .track-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .solo-btn {
            padding: 2px 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .solo-btn.active {
            background: #ffd400;
            color: black;
        }

        .gain-slider {
            width: 100%;
        }

        /* Timeline */

        #timeline-area {
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
            background: var(--bg-panel);
            overscroll-behavior: none;
        }

        #timeline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            /* right: 0; */
            /* bottom: 0; */
            pointer-events: none;
            z-index: 1;
        }

        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ff9500;
            z-index: 10;
        }

        .timeline-row {
            padding: 0px;
            box-sizing: border-box;
        }

        .row-inner {
            padding: 8px;
        }

        .waveform {
            display: inline-block;
            height: 80px;
            /* width: 2400px; */
            background-color: var(--bg-surface);
            /* background-image: repeating-linear-gradient(90deg,
                    #333,
                    #333 20px,
                    #2a2a2a 20px,
                    #2a2a2a 40px); */

            background-image: repeating-linear-gradient(90deg,
                    var(--waveform-a),
                    var(--waveform-a) 20px,
                    var(--waveform-b) 20px,
                    var(--waveform-b) 40px);


        }

        .waveform-canvas {
            display: block;
            height: 100%;
        }
    </style>
    <style>
        /* Themes CSS */

        body[data-theme="dark"] {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;

            --text-main: #eee;
            --text-muted: #aaa;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;
        }


        body[data-theme="light"] {
            --bg-app: #f5f5f5;
            --bg-surface: #ffffff;
            --bg-panel: #e6e6e6;

            --text-main: #111;
            --text-muted: #555;

            --waveform-a: #ddd;
            --waveform-b: #ccc;
        }


        body[data-theme="studio"] {
            --bg-app: #0f172a;
            --bg-surface: #111827;
            --bg-panel: #020617;

            --text-main: #d1d5db;
            --text-muted: #9ca3af;

            --waveform-a: #1f2933;
            --waveform-b: #111827;
        }


        /* Menu CSS */

        .menu-bar {
            height: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 12px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border-subtle);


            position: relative;
            z-index: 100;

        }

        .menu-label {
            display: flex;
            align-items: center;
            height: 100%;

            padding: 4px 6px;
            border-radius: 4px;
        }

        .menu:hover .menu-label {
            background: var(--bg-panel);
        }

        .menu {
            position: relative;
        }

        .menu-pop {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bg-panel);
            padding: 6px;
            min-width: 200px;
        }

        .menu:hover .menu-pop {
            display: block;
        }

        .menu-pop div {
            padding: 6px 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-pop div:hover {
            background: var(--bg-surface);
            border-radius: 4px;
        }
    </style>
    <style>
        /* Other CSS */
        /* =============================
            DEBUG SCROLL
        ============================= */

        body.debug {
            /* padding: 15px; */
        }

        body.debug #controls-column::after,
        body.debug #timeline-area::after {
            content: attr(data-scroll);
            position: sticky;
            top: 4px;
            font-size: 10px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
        }

        /* =============================
            DEBUG BOUNDING BOXES
        ============================= */

        body.debug .menu-bar {
            outline: 2px solid #ff00ff;
        }

        body.debug .transport {
            outline: 2px solid #00ffff;
        }

        body.debug .layout-root {
            outline: 2px solid #ffff00;
        }

        body.debug #controls-column {
            outline: 2px solid #ff9500;
        }

        body.debug #timeline-area {
            outline: 2px solid #4cd964;
        }

        body.debug #timeline-overlay {
            outline: 2px dashed #ffd400;
        }

        body.debug .control-row {
            outline: 1px dashed #ff3b30;
        }

        body.debug .timeline-row {
            outline: 1px dashed #4cd964;
        }
    </style>
</head>

<body>


    <div class="menu-bar">
        <div class="menu">
            <span class="menu-label">File</span>
            <div class="menu-pop">
                <div>New Project</div>
                <div>Open Project</div>
                <div>Save Project</div>
            </div>
        </div>

        <div class="menu">
            <span class="menu-label">Settings</span>
            <div class="menu-pop">
                <div data-theme="dark">Theme: Dark</div>
                <div data-theme="light">Theme: Light</div>
                <div data-theme="studio">Theme: Studio</div>
            </div>
        </div>
    </div>


    <div class="transport">
        <button id="playBtn">Play</button>
        <button id="recordBtn" class="record-btn">Record</button>
        <div class="timer" id="timer">00:00.0</div>
        <div class="meter" id="meter">
            <div class="meter-bar" id="meterBar"></div>
        </div>
    </div>

    <div class="layout-root">
        <div id="controls-column"></div>

        <div id="timeline-area">
            <div id="timeline-overlay">
                <div id="playhead"></div>
            </div>
            <div id="timeline-column"></div>
        </div>
    </div>

    <script>
        const controlsCol = document.getElementById("controls-column");
        const timelineCol = document.getElementById("timeline-column");
        const timelineArea = document.getElementById("timeline-area");

        // Sync scrollTop from timeline → controls
        // Add this once, after you define timelineArea and controlsCol:
        timelineArea.addEventListener("scroll", () => {
            controlsCol.scrollTop = timelineArea.scrollTop;

            // debug output
            if (document.body.classList.contains("debug")) {
                controlsCol.dataset.scroll =
                    controlsCol.scrollTop;
                timelineArea.dataset.scroll =
                    timelineArea.scrollTop;
            }
        });

        // add this js once
        controlsCol.addEventListener("wheel", (e) => {
            timelineArea.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });




        for (let i = 0; i < 8; i++) {
            const control = document.createElement("div");
            control.className = "control-row";

            const title = document.createElement("div");
            title.className = "track-title";
            title.contentEditable = "true";
            title.textContent = `Track ${i + 1}`;
            title.spellcheck = false;

            title.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    title.blur();
                }
            });

            title.addEventListener("blur", () => {
                const t = title.textContent.trim();
                title.textContent = t === "" ? `Track ${i + 1}` : t;
            });

            const controls = document.createElement("div");
            controls.className = "track-controls";

            const soloBtn = document.createElement("button");
            soloBtn.textContent = "S";
            soloBtn.className = "solo-btn";
            soloBtn.onclick = () => soloBtn.classList.toggle("active");

            const gain = document.createElement("input");
            gain.type = "range";
            gain.min = 0;
            gain.max = 100;
            gain.value = 80;
            gain.className = "gain-slider";

            controls.appendChild(soloBtn);
            controls.appendChild(gain);

            // control.appendChild(title);
            // control.appendChild(controls);


            const controlInner = document.createElement("div");
            controlInner.className = "row-inner";

            controlInner.appendChild(title);
            controlInner.appendChild(controls);
            control.appendChild(controlInner);


            const timeline = document.createElement("div");
            timeline.className = "timeline-row";
            //   timeline.innerHTML = `<div class="waveform"></div>`;

            const canvasWidth = 300 + i * 200; // different width per track

            timeline.innerHTML = `
            
            <div class="row-inner">
                <div class="waveform">
                <canvas
                    class="waveform-canvas"
                    width="${canvasWidth}"
                    height="80">
                </canvas>
                </div>
            </div>

            `;


            controlsCol.appendChild(control);
            timelineCol.appendChild(timeline);

            const ro = new ResizeObserver(([e]) => {
                control.style.height = `${e.contentRect.height}px`;
            });
            ro.observe(timeline);
        }

        /* Transport logic */

        const playBtn = document.getElementById("playBtn");
        const recordBtn = document.getElementById("recordBtn");
        const playhead = document.getElementById("playhead");
        const timer = document.getElementById("timer");
        const meter = document.getElementById("meter");
        const meterBar = document.getElementById("meterBar");

        let playing = false;
        let recording = false;
        let startTime = 0;

        const PPS = 100;
        const SCROLL_THRESHOLD = 120;

        function updatePlayhead() {
            if (!playing) return;

            const elapsed = (performance.now() - startTime) / 1000;
            const x = elapsed * PPS;

            playhead.style.transform = `translateX(${x}px)`;

            const right = timelineArea.scrollLeft + timelineArea.clientWidth;
            if (x > right - SCROLL_THRESHOLD) {
                timelineArea.scrollLeft =
                    x - (timelineArea.clientWidth - SCROLL_THRESHOLD);
            }

            timer.textContent = formatTime(elapsed);
            requestAnimationFrame(updatePlayhead);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            const t = Math.floor((s * 10) % 10);
            return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${t}`;
        }

        function updateMeter() {
            if (!recording) return;
            meterBar.style.width = `${20 + Math.random() * 80}%`;
            requestAnimationFrame(updateMeter);
        }

        playBtn.onclick = () => {
            if (recording) return;
            playing = !playing;
            playBtn.textContent = playing ? "Stop" : "Play";
            if (playing) {
                startTime = performance.now();
                updatePlayhead();
            } else {
                playhead.style.transform = "translateX(0px)";
                timelineArea.scrollLeft = 0;
                timer.textContent = "00:00.0";
            }
        };

        recordBtn.onclick = () => {
            recording = !recording;
            recordBtn.textContent = recording ? "Stop" : "Record";
            recordBtn.classList.toggle("recording", recording);

            playBtn.disabled = recording;

            meter.classList.toggle("active", recording);
            if (recording) updateMeter();
        };
        /* Menu and Themes Logic */

        document.querySelectorAll("[data-theme]").forEach(el => {
            el.onclick = () => {
                document.body.setAttribute("data-theme", el.dataset.theme);
            };
        });

        document.body.setAttribute("data-theme", "dark");



        document.addEventListener("keydown", (e) => {
            if (e.key === "d") {
                document.body.classList.toggle("debug");
            }
        });



        const timelineColumn = document.getElementById("timeline-column");
        const timelineOverlay = document.getElementById("timeline-overlay");

        // must be after all tracks are added
        timelineOverlay.style.width = `${timelineColumn.scrollWidth}px`;

        function syncTimelineOverlay() {
            const timelineColumn = document.getElementById("timeline-column");
            const timelineOverlay = document.getElementById("timeline-overlay");

            if (!timelineColumn || !timelineOverlay) return;

            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;

            timelineOverlay.style.height =
                `${timelineColumn.scrollHeight}px`;
        }

        // call this after all tracks are rendered
        syncTimelineOverlay();


    </script>

</body>

</html>
