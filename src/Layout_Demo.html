<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BareTrack/AudioPad/WaveStack - Layout Demo</title>

    <style>
        /* Structural CSS */
        :root {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;
            --bg-button: #828282;

            --text-main: #eee;
            --text-muted: #aaa;
            --text-button: #2f2f2f;

            --accent-primary: #ff9500;
            --accent-danger: #ff3b30;
            --accent-highlight: #ffd400;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;

            --border-subtle: #333;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;


            background: var(--bg-app);
            color: var(--text-main);

        }


        button {
            background: var(--bg-button);
            border: 1px solid var(--border-subtle);
            color: var(--text-button);
        }

        /* Transport */

        .transport {
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            /* background: #1a1a1a;
            border-bottom: 1px solid #333; */

            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-subtle);

        }

        .transport button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .transport button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }


        #transport-toggles {
            display: flex;
            gap: 8px;
        }

        .transport-toggle {
            /* width: 22px; */
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 3px;
            cursor: pointer;
        }

        .transport-toggle.active {
            background: #ff3b30;
            color: black;
        }


        .record-btn.recording {
            background: #ff3b30;
            color: black;
        }


        #playBtn.active {
            background: var(--accent-primary);
            color: black;
        }


        #playRecordBtn {
            border-radius: 6px 10px 10px 6px;
            padding: 5px;
        }

        #playRecordBtn.active {
            box-shadow:
                inset 0 0 0 2px rgba(0, 0, 0, 0.35);


            background: linear-gradient(90deg,
                    var(--accent-primary) 0%,
                    var(--accent-primary) 30%,
                    color-mix(in oklab, var(--accent-primary), var(--accent-danger)) 50%,
                    var(--accent-danger) 70%,
                    var(--accent-danger) 100%);


        }



        /* Timer */

        .timer {
            font-variant-numeric: tabular-nums;
            min-width: 80px;
        }

        /* Meter */

        .meter {
            width: 120px;
            height: 10px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .meter.active {
            display: block;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #4cd964, #ffd400, #ff3b30);
            transition: width 0.1s linear;
        }

        /* Layout */

        .layout-root {
            flex: 1;
            display: grid;
            grid-template-columns: 220px 1fr;
            overflow: hidden;
        }

        /* Controls column */

        #controls-column {
            background: var(--bg-app);
            overflow-y: hidden;
            overflow-x: hidden;
        }

        .control-row {
            padding: 0px;
            box-sizing: border-box;
        }

        /* Track name */

        .track-title {
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: text;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-title:hover {
            background: var(--bg-panel);
        }

        .track-title:focus {
            outline: 1px solid #ff9500;
            background: var(--bg-surface);
        }

        .track-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
        }

        .solo-btn {
            padding: 2px 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .solo-btn.active {
            background: #ffd400;
            color: black;
        }


        .solo-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .gain-slider {
            width: 100%;
        }


        .track-toggles {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }

        .toggle-btn {
            width: 22px;
            height: 16px;
            padding: 0;
            cursor: pointer;
            border-radius: 3px;
        }

        .toggle-btn.active {
            background: var(--accent-highlight);
        }


        /* Timeline */

        #timeline-area {
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
            background: var(--bg-panel);
            overscroll-behavior: none;
        }

        #timeline-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        #playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #ff9500;
            z-index: 10;
        }


        #record-range {

            position: absolute;
            top: 0;
            height: 2px;

            background: var(--accent-danger);
            opacity: 0.85;

            display: none;
            pointer-events: none;

        }


        .timeline-row {
            padding: 0px;
            box-sizing: border-box;
        }

        .row-inner {
            padding: 8px;
        }

        .waveform {
            display: inline-block;
            height: 80px;
            background-color: var(--bg-surface);

            background-image: repeating-linear-gradient(90deg,
                    var(--waveform-a),
                    var(--waveform-a) 20px,
                    var(--waveform-b) 20px,
                    var(--waveform-b) 40px);
        }

        .waveform-canvas {
            display: block;
            height: 100%;
        }
    </style>
    <style>
        /* Themes CSS */

        body[data-theme="dark"] {
            --bg-app: #111;
            --bg-surface: #222;
            --bg-panel: #1a1a1a;

            --text-main: #eee;
            --text-muted: #aaa;

            --waveform-a: #333;
            --waveform-b: #2a2a2a;
        }


        body[data-theme="light"] {
            --bg-app: #f5f5f5;
            --bg-surface: #ffffff;
            --bg-panel: #e6e6e6;

            --text-main: #111;
            --text-muted: #555;

            --waveform-a: #ddd;
            --waveform-b: #ccc;
        }


        body[data-theme="studio"] {
            --bg-app: #0f172a;
            --bg-surface: #111827;
            --bg-panel: #020617;

            --text-main: #d1d5db;
            --text-muted: #9ca3af;

            --waveform-a: #1f2933;
            --waveform-b: #111827;
        }


        /* Menu CSS */

        .menu-bar {
            height: 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 12px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border-subtle);


            position: relative;
            z-index: 100;

        }

        .menu-label {
            display: flex;
            align-items: center;
            height: 100%;

            padding: 4px 6px;
            border-radius: 4px;
        }

        .menu:hover .menu-label {
            background: var(--bg-panel);
        }

        .menu {
            position: relative;
        }

        .menu-pop {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--bg-panel);
            padding: 6px;
            min-width: 200px;
        }

        .menu:hover .menu-pop {
            display: block;
        }

        .menu-pop div {
            padding: 6px 12px;
            white-space: nowrap;
            cursor: pointer;
        }

        .menu-pop div:hover {
            background: var(--bg-surface);
            border-radius: 4px;
        }
    </style>
    <style>
        /* Other CSS */

        /* =============================
            DEBUG TRANSPORT STATE
        ============================= */

        #debug-transport-state {
            position: fixed;
            right: 8px;
            bottom: 8px;

            padding: 6px 10px;
            font-family: monospace;
            font-size: 12px;

            background: rgba(0, 0, 0, 0.75);
            color: #eee;
            border-radius: 4px;

            pointer-events: none;
            display: none;
        }

        body.debug #debug-transport-state {
            display: block;
        }

        /* =============================
            DEBUG SCROLL
        ============================= */

        body.debug {
            /* padding: 15px; */
        }

        body.debug #controls-column::after,
        body.debug #timeline-area::after {
            content: attr(data-scroll);
            position: sticky;
            top: 4px;
            font-size: 10px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
        }

        /* =============================
            DEBUG BOUNDING BOXES
        ============================= */

        body.debug .menu-bar {
            outline: 2px solid #ff00ff;
        }

        body.debug .transport {
            outline: 2px solid #00ffff;
        }

        body.debug .layout-root {
            outline: 2px solid #ffff00;
        }

        body.debug #controls-column {
            outline: 2px solid #ff9500;
        }

        body.debug #timeline-area {
            outline: 2px solid #4cd964;
        }

        body.debug #timeline-overlay {
            outline: 2px dashed #ffd400;
        }

        body.debug .control-row {
            outline: 1px dashed #ff3b30;
        }

        body.debug .timeline-row {
            outline: 1px dashed #4cd964;
        }
    </style>
</head>

<body>


    <div class="menu-bar">
        <div class="menu">
            <span class="menu-label">File</span>
            <div class="menu-pop">
                <div>New Project</div>
                <div>Open Project</div>
                <div>Save Project</div>
            </div>
        </div>

        <div class="menu">
            <span class="menu-label">Settings</span>
            <div class="menu-pop">
                <div data-theme="dark">Theme: Dark</div>
                <div data-theme="light">Theme: Light</div>
                <div data-theme="studio">Theme: Studio</div>
            </div>
        </div>
    </div>


    <div class="transport">

        <div id="transport-toggles">
            <button class="transport-toggle">A</button>
            <button class="transport-toggle">B</button>
            <button class="transport-toggle">C</button>
            <button class="transport-toggle">D</button>
            <button class="transport-toggle">E</button>
        </div>


        <button id="playBtn" aria-label="Play">
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                <polygon points="3,2 12,7 3,12" fill="currentColor" />
            </svg>
        </button>


        <button id="playRecordBtn" class="transport-toggle" aria-label="Play and Record">



            <svg width="24" height="14" viewBox="0 0 24 14" aria-hidden="true">
                <polygon points="1,2 8,7 1,12" fill="currentColor" />
                <circle cx="18.5" cy="7" r="4.5" fill="currentColor" />
            </svg>



        </button>


        <button id="recordBtn" class="record-btn" aria-label="Record">
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
                <circle cx="7" cy="7" r="5" fill="currentColor" />
            </svg>
        </button>


        <div class="timer" id="timer">00:00.0</div>
        <div class="meter" id="meter">
            <div class="meter-bar" id="meterBar"></div>
        </div>
    </div>

    <div class="layout-root">
        <div id="controls-column"></div>

        <div id="timeline-area">
            <div id="timeline-overlay">
                <div id="playhead"></div>
                <div id="record-range"></div>
            </div>
            <div id="timeline-column"></div>
        </div>
    </div>


    <template id="control-row-template">
        <div class="control-row">
            <div class="row-inner">
                <div class="track-title" contenteditable="true"></div>
                <div class="track-controls">
                    <button class="solo-btn">S</button>
                    <input type="range" class="gain-slider" min="0" max="100" value="80" />
                </div>

                <div class="track-toggles">
                    <button class="toggle-btn">A</button>
                    <button class="toggle-btn">B</button>
                    <button class="toggle-btn">C</button>
                    <button class="toggle-btn">D</button>
                    <button class="toggle-btn">E</button>
                </div>

            </div>
        </div>
    </template>

    <template id="timeline-row-template">
        <div class="timeline-row">
            <div class="row-inner">
                <div class="waveform">
                    <canvas class="waveform-canvas" height="80"></canvas>
                </div>
            </div>
        </div>
    </template>

    <div id="debug-transport-state"></div>

    <script>
        // ----- Constants -----
        // ----- DOM References -----
        // ----- Transport State -----
        // ----- Transport Helpers -----
        // ----- Transport Rendering -----
        // ----- Animation Loops -----
        // ----- Scroll / Geometry Sync -----
        // ----- Track & Control Interaction -----
        // ----- Theme / Debug / Global UI -----
        // ----- One‑time Initialization -----

        // ==========================
        // CONSTANTS
        // ==========================
        //#region CONSTANTS
        /**
         * Constant values
         **/
        const PPS = 100;
        const SCROLL_THRESHOLD = 120;

        //#endregion
        // ==========================
        // DOM REFERENCES
        // ==========================
        //#region DOM REFERENCES
        /**
                 * Put all DOM queries at the top.
                 * Nothing else allowed here.
                 * If you ever need a new DOM element later, it goes here, not inline in logic.
                 * This alone reduces mental context switching a lot.
                 **/
        const controlsCol = document.getElementById("controls-column");
        const timelineCol = document.getElementById("timeline-column");
        const timelineArea = document.getElementById("timeline-area");
        const timelineColumn = document.getElementById("timeline-column");
        const timelineOverlay = document.getElementById("timeline-overlay");

        // templates
        const controlTpl = document.getElementById("control-row-template");
        const timelineTpl = document.getElementById("timeline-row-template");

        // transport
        const playBtn = document.getElementById("playBtn");
        const playRecordBtn = document.getElementById("playRecordBtn");
        const recordBtn = document.getElementById("recordBtn");
        const playhead = document.getElementById("playhead");
        const timer = document.getElementById("timer");
        const meter = document.getElementById("meter");
        const meterBar = document.getElementById("meterBar");
        const recordRange =
            document.getElementById("record-range");
        const transportToggles =
            document.querySelectorAll("#transport-toggles .transport-toggle");

        // debug
        const debugTransportState = document.getElementById("debug-transport-state");


        //#endregion
        // ==========================
        // TRANSPORT STATE
        // ==========================
        //#region
        /**
         * This section contains only variables, no functions.
         * When you read this block, you should think:
         * “This is the entire transport memory.”
         **/
        let playing = false;
        let recording = false;
        let startTime = 0;
        let recordStartX = null;

        //#endregion
        // ==========================
        // TRANSPORT HELPERS
        // ==========================
        //#region
        /**
         * These helpers answer questions or calculations.
         * They do not mutate DOM.
         * You are not required to use these everywhere yet.
         * Their existence alone stabilizes the mental model.
         * 
         * This is pure logic. No DOM mutation.
         * This is a query, not an effect
         * Multiple future features will use this (record ranges, scrubbing, punch‑in)
         * Deterministic
         * Stateless
         * Used by animation loop
         * 
         * State machines are for branching decisions, not for mutations.

            So:

            getTransportState() → decision logic
            button handlers → state changes
            animation/UI sync → rendering

         **/
        function isTransportMoving() {
            return getTransportState() !== "IDLE";
        }

        // tiny state machine
        // Use getTransportState() to explain behavior, not to control everything.
        /** 
         * State mutations change flags.
         * Transition detection decides behavior.
         **/
        function getTransportState() {
            if (playing && recording) return "PLAY_RECORD";
            if (playing) return "PLAY";
            if (recording) return "RECORD";
            return "IDLE";
        }

        function getPlayheadX() {
            const transform = playhead.style.transform;
            if (!transform) return 0;

            const match = transform.match(/translateX\(([-\d.]+)px\)/);
            return match ? parseFloat(match[1]) : 0;
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            const t = Math.floor((s * 10) % 10);
            return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${t}`;
        }

        //#endregion
        // ==========================
        // TRANSPORT UI DOM SYNC
        // ==========================
        //#region
        /**
         * This is your UI truth layer.
         * Nothing in here:
         * toggles state
         * decides behavior
         * starts timers
         * It only reflects current state.
         * If something looks wrong visually, the bug is here, not in button handlers.
         **/
        function syncTransportUI() {
            const state = getTransportState();

            playBtn.classList.toggle("active", state === "PLAY" || state === "PLAY_RECORD");
            recordBtn.classList.toggle("recording", state === "RECORD" || state === "PLAY_RECORD");
            playRecordBtn.classList.toggle("active", state === "PLAY_RECORD");
            meter.classList.toggle("active", state === "RECORD" || state === "PLAY_RECORD");


            // DEBUG OVERLAY
            if (document.body.classList.contains("debug")) {
                debugTransportState.textContent =
                    `Transport: ${state}`;
            }

        }

        //#endregion
        // ==========================
        // ANIMATION LOOPS
        // ==========================
        //#region
        /**
         * These are special. They:
         * run forever
         * draw based on state
         * never change state
         * 
         * Notice:
         * no buttons
         * no toggles
         * no branching chaos
         * This dramatically lowers cognitive load.
         **/
        function updatePlayhead() {
            if (getTransportState() === "IDLE") return;

            const elapsed = (performance.now() - startTime) / 1000;
            const x = elapsed * PPS;

            playhead.style.transform = `translateX(${x}px)`;

            // recording range update
            if (recording && recordStartX !== null) {
                const width = x - recordStartX;

                recordRange.style.width =
                    `${Math.max(0, width)}px`;
            }

            // scroll
            const right = timelineArea.scrollLeft + timelineArea.clientWidth;
            if (x > right - SCROLL_THRESHOLD) {
                timelineArea.scrollLeft =
                    x - (timelineArea.clientWidth - SCROLL_THRESHOLD);
            }

            timer.textContent = formatTime(elapsed);
            requestAnimationFrame(updatePlayhead);
        }

        function resetPlayhead() {
            playhead.style.transform = "translateX(0px)";
            timelineArea.scrollLeft = 0;
            timer.textContent = "00:00.0";
        }

        function updateMeter() {
            if (recording) {
                meterBar.style.width = `${20 + Math.random() * 80}%`;
            }
            requestAnimationFrame(updateMeter);
        }

        //#endregion
        // ==========================
        // SCROLL / GEOMETRY SYNC
        // ==========================
        //#region
        /**
         * This governs shared vertical scrolling, which is orthogonal to transport.
         * Why here
         * It’s not transport logic
         * It’s not UI rendering
         * It’s about input routing + geometry
         * Later, if bugs appear here, your brain knows exactly where to look.
         **/

        // Sync scrollTop from timeline → controls
        // Add this once, after you define timelineArea and controlsCol:
        timelineArea.addEventListener("scroll", () => {
            controlsCol.scrollTop = timelineArea.scrollTop;

            // debug output
            if (document.body.classList.contains("debug")) {
                controlsCol.dataset.scroll =
                    controlsCol.scrollTop;
                timelineArea.dataset.scroll =
                    timelineArea.scrollTop;
            }
        });

        // add this js once
        controlsCol.addEventListener("wheel", (e) => {
            timelineArea.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });


        function syncTimelineOverlay() {
            const timelineColumn = document.getElementById("timeline-column");
            const timelineOverlay = document.getElementById("timeline-overlay");

            if (!timelineColumn || !timelineOverlay) return;

            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;

            timelineOverlay.style.height =
                `${timelineColumn.scrollHeight}px`;
        }


        function syncTimelineOverlayWidth() {
            timelineOverlay.style.width =
                `${timelineColumn.scrollWidth}px`;
        }


        //#endregion
        // ==========================
        // TRACK & CONTROL INTERACTION
        // ==========================
        //#region
        /* This is local UI behavior, not transport state. Why here

        These are not play/record state
        They are UI‑only mode selectors
        Later could move to their own helper 

        track‑local control behavior.

        Why here

        Operates on tracks
        Has its own micro‑state
        Should never bleed into transport concerns
        */
        // linked toggle behavior
        transportToggles.forEach(btn => {
            btn.addEventListener("click", () => {
                transportToggles.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        // solo buttons

        function setupSoloBtns() {
            const soloButtons = Array.from(
                document.querySelectorAll(".solo-btn")
            );
            soloButtons.forEach(btn => {
                btn.addEventListener("click", () => {
                    const isActive = btn.classList.contains("active");

                    // Reset all
                    soloButtons.forEach(b => {
                        b.classList.remove("active");
                        b.disabled = false;
                    });

                    // If clicked button was not active, activate it and disable others
                    if (!isActive) {
                        btn.classList.add("active");
                        soloButtons.forEach(b => {
                            if (b !== btn) b.disabled = true;
                        });
                    }
                });
            });
        }

        //#endregion
        // ==========================
        // THEME / DEBUG / GLOBAL UI
        // ==========================
        //#region
        /* Menu and Themes Logic 
        Global UI concern
        No effect on transport or tracks

        Global tool
        Orthogonal to everything else
        */

        document.querySelectorAll("[data-theme]").forEach(el => {
            el.onclick = () => {
                document.body.setAttribute("data-theme", el.dataset.theme);
            };
        });

        document.body.setAttribute("data-theme", "light");

        document.addEventListener("keydown", (e) => {
            if (e.key === "d") {
                document.body.classList.toggle("debug");
            }
        });

        //#endregion
        // ==========================
        // TRACK CREATION
        // ==========================
        //#region
        /**
         * When you read this block later, you know it does not affect transport state.
         **/
        for (let i = 0; i < 8; i++) {
            /* ----- Controls Row ----- */

            const controlFrag = controlTpl.content.cloneNode(true);
            const controlRow = controlFrag.querySelector(".control-row");
            const title = controlFrag.querySelector(".track-title");
            const soloBtn = controlFrag.querySelector(".solo-btn");

            title.textContent = `Track ${i + 1}`;
            title.spellcheck = false;

            title.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    title.blur();
                }
            });

            title.addEventListener("blur", () => {
                const t = title.textContent.trim();
                title.textContent = t === "" ? `Track ${i + 1}` : t;
            });

            controlFrag.querySelectorAll(".toggle-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    btn.classList.toggle("active");
                });
            });

            controlsCol.appendChild(controlFrag);

            /* ----- Timeline Row ----- */

            const timelineFrag = timelineTpl.content.cloneNode(true);
            const timelineRow = timelineFrag.querySelector(".timeline-row");
            const canvas = timelineFrag.querySelector(".waveform-canvas");

            const canvasWidth = 300 + i * 200;
            canvas.width = canvasWidth;

            timelineCol.appendChild(timelineFrag);

            /* ----- Height Sync ----- */

            const ro = new ResizeObserver(([e]) => {
                controlRow.style.height = `${e.contentRect.height}px`;
            });

            ro.observe(timelineRow);
        }

        //#endregion
        // ==========================
        // TRANSPORT BUTTON HANDLERS
        // ==========================
        //#region
        /**
         * This is the only place where transport state changes. 
         * Keep them boring and small.
         * This is where future complexity will live — now it’s clearly contained.
         **/

        function startRecordingRange() {
            recordStartX = getPlayheadX();
            recordRange.style.display = "block";
            recordRange.style.left = `${recordStartX}px`;
            recordRange.style.width = "0px";
        }

        function clearRecordingRange() {
            recordRange.style.display = "none";
            recordStartX = null;
        }

        function applyTransportChange({ play, record }) {
            const prevState = getTransportState();
            const wasRecording = recording;

            playing = play;
            recording = record;

            const nextState = getTransportState();

            if (prevState === "IDLE" && nextState !== "IDLE") {
                startTime = performance.now();
                updatePlayhead();
            }

            if (prevState !== "IDLE" && nextState === "IDLE") {
                resetPlayhead();
            }

            if (!wasRecording && recording) startRecordingRange();
            if (wasRecording && !recording) clearRecordingRange();

            syncTransportUI();
        }


        playBtn.onclick = () =>
            applyTransportChange({ play: !playing, record: recording });

        recordBtn.onclick = () =>
            applyTransportChange({ play: playing, record: !recording });

        playRecordBtn.onclick = () =>
            applyTransportChange({
                play: getTransportState() !== "PLAY_RECORD",
                record: getTransportState() !== "PLAY_RECORD"
            });


        //#endregion
        // ==========================
        // INITIALIZATION
        // ==========================
        //#region
        setupSoloBtns();
        updateMeter();
        syncTimelineOverlayWidth();
        syncTimelineOverlay();
        //#endregion
        // ==========================
        // END OF SCRIPT
        // ==========================


    </script>

</body>

</html>
